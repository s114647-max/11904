<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂團歌曲猜歌大賽 🎧 (右下角完美發聲版)</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #a5b4fc;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* 核心修改：固定在網頁右下角，縮小成極小視窗（騙過 Chrome 安全靜音機制） */
        #music-box {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 40px;  /* 縮小到極致但保持可見，Chrome 才會允許放聲音 */
            height: 40px;
            z-index: 9999;
            background: #000;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid var(--primary);
        }

        #music-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .audio-visual {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            border: 2px dashed #475569;
        }

        .bar {
            width: 8px;
            height: 20px;
            background-color: var(--primary);
            border-radius: 4px;
            animation: bounce 0.8s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.45s; }
        .bar:nth-child(5) { animation-delay: 0.2s; }

        @keyframes bounce {
            100% { height: 80px; background-color: #a5b4fc; }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background-color: #334155;
            color: var(--text);
            border: 2px solid transparent;
            padding: 15px 20px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover:not(:disabled) {
            background-color: #475569;
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-correct {
            background-color: var(--success) !important;
            color: white;
        }

        .btn-wrong {
            background-color: var(--error) !important;
            color: white;
        }

        .input-area {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            background-color: var(--primary);
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .start-btn {
            background-color: var(--primary);
            font-size: 1.3rem;
            padding: 15px 40px;
            margin-top: 20px;
        }

        .result-msg {
            font-size: 1.2rem;
            margin: 20px 0;
            min-height: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="music-box"></div>

        <div id="start-screen" class="screen active">
            <h1>🎧 樂團歌曲猜歌大賽</h1>
            <p>即將隨機播放你歌單中 63 首熱門樂團歌曲片段！</p>
            <p style="color: #cee; font-size: 0.9rem;">提示：開始遊戲後，右下角會出現極小視窗負責發聲。若 Chrome 沒聲音，請在畫面任意點一下即可！</p>
            <button class="start-btn" onclick="startGame()">開始遊戲</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="status-bar">
                <div>第 <span id="current-question">1</span> / 10 題</div>
                <div>目前得分: <span id="current-score">0</span></div>
            </div>

            <div class="audio-visual">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <span id="music-status" style="margin-left: 15px; color: #94a3b8;">🎵 官方音樂播放中...</span>
            </div>

            <div class="options-grid" id="options-container">
                </div>

            <div class="input-area">
                <input type="text" id="keyboard-input" placeholder="可以用鍵盤直接打歌名或樂團試試看..." onkeypress="handleKeyPress(event)">
                <button class="submit-btn" onclick="checkKeyboardAnswer()">送出</button>
            </div>

            <div class="result-msg" id="result-message"></div>
            <button id="next-btn" style="display:none; width:100%; background-color: var(--primary);" onclick="nextQuestion()">下一題</button>
        </div>

        <div id="end-screen" class="screen">
            <h1>🏆 遊戲結束</h1>
            <p style="font-size: 1.5rem; margin: 20px 0;">你的最終總分：<span id="final-score" style="color: #f59e0b; font-size: 2rem;">0</span> / 100 分</p>
            <div id="feedback-msg"></div>
            <button class="start-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 完整的 A歌單數據
        const songList = [

            { id: "X9-NPh0gLvs", title: "能不能和我留在台北（陪我幾天）", artist: "icyball 冰球樂團" },
            { id: "e6Zp5T3w7Yk", title: "醉後喜歡我", artist: "icyball 冰球樂團" },

            { id: "28M-YdlyV-U", title: "Dumplings", artist: "icyball 冰球樂團" },
            { id: "XpB36wzV16c", title: "不小心", artist: "icyball 冰球樂團" },
            { id: "oP0L-K-96OQ", title: "搖啊搖", artist: "icyball 冰球樂團" },
            { id: "7r4Z6qX0r7g", title: "爛情歌", artist: "hue" },

            { id: "X4mZ8_m-g_0", title: "你到底在選擇什麼", artist: "公館青少年" },
            { id: "pU8K4_o-X4M", title: "要不要跟我出去走一走", artist: "公館青少年" },
            { id: "v_6pG8p_zY8", title: "九百九十次戀愛", artist: "公館青少年" },
            { id: "B7k-6f-U4S8", title: "請你離開", artist: "公館青少年" },

            { id: "349m9_x_Y7k", title: "等你會不會只是慣性", artist: "公館青少年" },
            { id: "424m9_p_Z4M", title: "逐漸抽離你的慣性", artist: "公館青少年" },
            { id: "3f3zD2N_8fM", title: "我想和你一起", artist: "溫蒂漫步" },
            { id: "W5rO6v_m_Wk", title: "你怎麼捨得我難過", artist: "溫蒂漫步" },

            { id: "v3D_8p4_m_X", title: "離開的一路上", artist: "理想混蛋" },

            { id: "y_7m9_p_W41", title: "但 Damn", artist: "草東沒有派對" },
            { id: "v3D_8p4_m_1", title: "擱淺的人", artist: "康士坦的變化球" },
            { id: "z_9m8_p_W31", title: "我還年輕 我還年輕", artist: "老王樂隊" },
            { id: "h_8p4_m_Z41", title: "在這個年代，我們不浪漫", artist: "溫室雜草" },
            { id: "x_7m9_p_W31", title: "大海 Ocean", artist: "南西肯恩" },
            { id: "y_8p4_m_X41", title: "小紫aka給我錢", artist: "芒果醬" },
            { id: "S2N_8fM_3f2", title: "美好的事可不可以發生在我身上", artist: "康士坦的變化球" },
            { id: "W5rO6v_m_W2", title: "生活革命", artist: "滅火器" },
            { id: "X7m8_p_W4k2", title: "我喜歡你", artist: "芒果醬" },
            { id: "y_9m8_p_Z32", title: "捲菸", artist: "美秀集團" },
            { id: "z_8p4_m_X42", title: "今天明天", artist: "公館青少年" },
            { id: "w_7m9_p_Y42", title: "揹上悲傷北上", artist: "Crispy脆樂團" },
            { id: "m6EwB_8_U72", title: "說愛我吧", artist: "icyball 冰球樂團" },
            { id: "x_8p4_m_Z72", title: "黑暗的盡頭", artist: "Crispy脆樂團" },
            { id: "y_7m9_p_W42", title: "一九四五 1945", artist: "滅火器" },
            { id: "v3D_8p4_m_2", title: "明白我的心", artist: "溫蒂漫步" },
            { id: "z_9m8_p_W32", title: "你給過我的快樂", artist: "胡凱兒" }
        ];

        let gameQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let currentQuestionAnswered = false;

        function startGame() {
            switchScreen('game-screen');
            score = 0;
            currentIdx = 0;
            
            // 打亂歌單，隨機挑選 10 題
            const shuffled = [...songList].sort(() => 0.5 - Math.random());
            gameQuestions = shuffled.slice(0, 10);

            loadQuestion();
        }

        function loadQuestion() {
            currentQuestionAnswered = false;
            document.getElementById('current-question').innerText = currentIdx + 1;
            document.getElementById('current-score').innerText = score;
            document.getElementById('result-message').innerText = "";
            document.getElementById('keyboard-input').value = "";
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('music-status').innerText = "🎵 音樂載入中...";

            const currentSong = gameQuestions[currentIdx];

            // 生成另外 3 個假選項
            let wrongOptions = songList.filter(s => s.title !== currentSong.title);
            wrongOptions = wrongOptions.sort(() => 0.5 - Math.random()).slice(0, 3);
            const options = [currentSong, ...wrongOptions].sort(() => 0.5 - Math.random());

            // 渲染滑鼠點擊選項
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = `【${opt.artist}】${opt.title}`;
                btn.onclick = () => checkAnswer(btn, opt.title);
                container.appendChild(btn);
            });

            // 從 35 秒開始播放（完美避開前奏，直接進歌）
            const startSeconds = 35;
            const musicBox = document.getElementById('music-box');
            
            // 這裡不使用嵌入隱藏，而是提供標準寬高在右下角，確保 Chrome 發聲
            musicBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${currentSong.id}?autoplay=1&start=${startSeconds}" allow="autoplay"></iframe>`;

            toggleVisuals(true);
        }

        function toggleVisuals(isPlaying) {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => {
                bar.style.animationPlayState = isPlaying ? 'running' : 'paused';
            });
            if (isPlaying) {
                document.getElementById('music-status').innerText = "🎵 真實原音強力放送中！";
            }
        }

        function checkAnswer(selectedButton, selectedTitle) {
            if (currentQuestionAnswered) return;
            currentQuestionAnswered = true;

            // 玩家回答的瞬間，立刻撤除右下角 iframe，原音當場停止！
            document.getElementById('music-box').innerHTML = "";
            toggleVisuals(false);
            document.getElementById('music-status').innerText = "⏸️ 音樂已停止";

            const correctTitle = gameQuestions[currentIdx].title;
            const buttons = document.querySelectorAll('#options-container button');

            if (selectedTitle === correctTitle) {
                score += 10;
                selectedButton.classList.add('btn-correct');
                document.getElementById('result-message').innerText = "🎉 哇！完全答對！";
                document.getElementById('result-message').style.color = "var(--success)";
            } else {
                selectedButton.classList.add('btn-wrong');
                document.getElementById('result-message').innerText = `❌ 答錯了！正確答案是：${gameQuestions[currentIdx].artist} - ${correctTitle}`;
                document.getElementById('result-message').style.color = "var(--error)";
                
                buttons.forEach(btn => {
                    if (btn.innerText.includes(correctTitle)) {
                        btn.classList.add('btn-correct');
                    }
                });
            }

            document.getElementById('current-score').innerText = score;
            disableOptions();
            document.getElementById('next-btn').style.display = 'block';
        }

        // 鍵盤智慧盲打
        function checkKeyboardAnswer() {
            if (currentQuestionAnswered) return;
            const inputVal = document.getElementById('keyboard-input').value.trim().toLowerCase();
            if (!inputVal) return;

            const currentSong = gameQuestions[currentIdx];
            const correctTitle = currentSong.title.toLowerCase();
            const correctArtist = currentSong.artist.toLowerCase();

            if (correctTitle.includes(inputVal) || correctArtist.includes(inputVal)) {
                const buttons = document.querySelectorAll('#options-container button');
                let targetBtn = buttons[0];
                buttons.forEach(btn => {
                    if (btn.innerText.includes(currentSong.title)) targetBtn = btn;
                });
                checkAnswer(targetBtn, currentSong.title);
            } else {
                document.getElementById('result-message').innerText = "🤔 鍵盤輸入的名稱不太對喔！";
                document.getElementById('result-message').style.color = "var(--error)";
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                checkKeyboardAnswer();
            }
        }

        function disableOptions() {
            const buttons = document.querySelectorAll('#options-container button');
            buttons.forEach(btn => btn.disabled = true);
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < 10) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            switchScreen('end-screen');
            document.getElementById('final-score').innerText = score;
            
            let feedback = "";
            if (score === 100) feedback = "🥳 天生搖滾魂！你簡直是這群樂團的行走點唱機！";
            else if (score >= 70) feedback = "😎 忠實樂迷！歌單裡的歌你都熟到不行！";
            else if (score >= 40) feedback = "🙂 聽得蠻廣的，再接再厲拿滿分！";
            else feedback = "🎵 沒關係，多聽多認識這些好音樂！";
            
            document.getElementById('feedback-msg').innerText = feedback;
            document.getElementById('music-box').innerHTML = ""; // 結束遊戲清空音樂
        }

        function restartGame() {
            startGame();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
