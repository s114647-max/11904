<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜歌大挑戰</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #0a0a0f;
    --c-surface: #13131a;
    --c-surface2: #1c1c27;
    --c-border: rgba(255,255,255,0.08);
    --c-text: #f0f0f8;
    --c-muted: #8888aa;
    --c-accent: #7c6fff;
    --c-accent2: #ff6fa8;
    --c-gold: #ffd166;
    --c-green: #06d6a0;
    --c-red: #ef233c;
    --c-blue: #4cc9f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--c-bg);
    color: var(--c-text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }

  /* ─── INTRO SCREEN ─── */
  #screen-intro { gap: 3rem; }

  .logo-area { text-align: center; }
  .logo-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--c-accent), var(--c-accent2));
    border-radius: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 1.5rem;
    box-shadow: 0 0 40px rgba(124,111,255,0.4);
  }
  .logo-title {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--c-accent), var(--c-accent2), var(--c-gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .logo-sub { color: var(--c-muted); font-size: 1rem; margin-top: 0.5rem; }

  .playlist-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    width: 100%;
    max-width: 640px;
  }
  .playlist-btn {
    background: var(--c-surface);
    border: 1.5px solid var(--c-border);
    border-radius: 16px;
    padding: 1.5rem 1rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    color: var(--c-text);
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }
  .playlist-btn::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 14px;
  }
  .playlist-btn.a::before { background: linear-gradient(135deg, rgba(76,201,240,0.15), transparent); }
  .playlist-btn.b::before { background: linear-gradient(135deg, rgba(255,111,168,0.15), transparent); }
  .playlist-btn.c::before { background: linear-gradient(135deg, rgba(255,209,102,0.15), transparent); }
  .playlist-btn:hover::before { opacity: 1; }
  .playlist-btn:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.2);
  }
  .playlist-btn.selected.a { border-color: var(--c-blue); box-shadow: 0 0 20px rgba(76,201,240,0.3); }
  .playlist-btn.selected.b { border-color: var(--c-accent2); box-shadow: 0 0 20px rgba(255,111,168,0.3); }
  .playlist-btn.selected.c { border-color: var(--c-gold); box-shadow: 0 0 20px rgba(255,209,102,0.3); }

  .playlist-letter {
    font-size: 2.5rem;
    font-weight: 900;
    font-family: 'Space Grotesk', sans-serif;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .a .playlist-letter { color: var(--c-blue); }
  .b .playlist-letter { color: var(--c-accent2); }
  .c .playlist-letter { color: var(--c-gold); }

  .playlist-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.25rem; }
  .playlist-desc { font-size: 0.72rem; color: var(--c-muted); }

  .start-btn {
    background: linear-gradient(135deg, var(--c-accent), var(--c-accent2));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 1rem 3rem;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 30px rgba(124,111,255,0.4);
    letter-spacing: 0.05em;
  }
  .start-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 40px rgba(124,111,255,0.5); }
  .start-btn:active { transform: scale(0.98); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── GAME SCREEN ─── */
  #screen-game {
    justify-content: flex-start;
    padding-top: 1.5rem;
    gap: 0;
  }

  .game-header {
    width: 100%; max-width: 700px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
    gap: 1rem;
  }
  .progress-wrap { flex: 1; }
  .progress-label { font-size: 0.75rem; color: var(--c-muted); margin-bottom: 6px; }
  .progress-bar {
    height: 6px; background: var(--c-surface2);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--c-accent), var(--c-accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .score-badge {
    background: var(--c-surface2);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    padding: 0.4rem 0.9rem;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--c-gold);
    white-space: nowrap;
  }

  .player-area {
    width: 100%; max-width: 700px;
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
  }
  .now-playing-label { font-size: 0.75rem; color: var(--c-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .waveform {
    display: flex; gap: 4px; align-items: center; height: 48px;
  }
  .wave-bar {
    width: 4px; background: var(--c-accent); border-radius: 99px;
    animation: wave 1.2s ease-in-out infinite;
    opacity: 0.7;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; height: 20px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 35px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 28px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 42px; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 22px; }
  .wave-bar:nth-child(6) { animation-delay: 0.5s; height: 38px; }
  .wave-bar:nth-child(7) { animation-delay: 0.6s; height: 30px; }
  .wave-bar:nth-child(8) { animation-delay: 0.7s; height: 44px; }
  .wave-bar:nth-child(9) { animation-delay: 0.8s; height: 18px; }
  .wave-bar:nth-child(10) { animation-delay: 0.9s; height: 36px; }
  .wave-bar:nth-child(11) { animation-delay: 1.0s; height: 26px; }
  .wave-bar:nth-child(12) { animation-delay: 1.1s; height: 40px; }
  .waveform.paused .wave-bar { animation-play-state: paused; }

  @keyframes wave {
    0%, 100% { transform: scaleY(1); opacity: 0.7; }
    50% { transform: scaleY(0.4); opacity: 1; }
  }

  .timer-row {
    display: flex; align-items: center; gap: 1rem; width: 100%;
  }
  .timer-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--c-surface2);
    border: 2px solid var(--c-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 700;
    flex-shrink: 0;
    position: relative;
    transition: color 0.3s;
  }
  .timer-circle.urgent { color: var(--c-red); border-color: var(--c-red); animation: pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse { to { box-shadow: 0 0 15px rgba(239,35,60,0.4); } }

  .hint-text {
    flex: 1;
    font-size: 0.85rem;
    color: var(--c-muted);
    line-height: 1.5;
  }
  .hint-text strong { color: var(--c-text); }

  .hidden-yt { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }

  .options-grid {
    width: 100%; max-width: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .option-btn {
    background: var(--c-surface);
    border: 1.5px solid var(--c-border);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    color: var(--c-text);
    font-family: inherit;
    font-size: 0.9rem;
    display: flex; align-items: center; gap: 0.75rem;
    position: relative; overflow: hidden;
  }
  .option-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(124,111,255,0.08);
    opacity: 0; transition: opacity 0.18s;
  }
  .option-btn:hover::after { opacity: 1; }
  .option-btn:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
  .option-btn:active { transform: scale(0.98); }
  .option-btn:disabled { cursor: default; transform: none; }
  .option-btn.correct { border-color: var(--c-green) !important; background: rgba(6,214,160,0.1) !important; color: var(--c-green); }
  .option-btn.wrong { border-color: var(--c-red) !important; background: rgba(239,35,60,0.1) !important; color: var(--c-red); }
  .option-btn.reveal { border-color: rgba(255,255,255,0.25); background: var(--c-surface2); }

  .option-key {
    width: 28px; height: 28px; flex-shrink: 0;
    background: var(--c-surface2);
    border: 1px solid var(--c-border);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.18s;
  }
  .option-btn.correct .option-key { background: rgba(6,214,160,0.2); border-color: var(--c-green); color: var(--c-green); }
  .option-btn.wrong .option-key { background: rgba(239,35,60,0.2); border-color: var(--c-red); color: var(--c-red); }

  .option-song { flex: 1; }
  .option-title { font-weight: 600; font-size: 0.9rem; line-height: 1.3; }
  .option-artist { font-size: 0.75rem; color: var(--c-muted); margin-top: 2px; }
  .option-btn.correct .option-artist,
  .option-btn.wrong .option-artist { color: inherit; opacity: 0.7; }

  .feedback-bar {
    width: 100%; max-width: 700px;
    min-height: 60px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 600;
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    text-align: center;
    transition: all 0.3s;
    opacity: 0;
  }
  .feedback-bar.show { opacity: 1; }
  .feedback-bar.correct-fb { background: rgba(6,214,160,0.12); color: var(--c-green); border: 1px solid rgba(6,214,160,0.3); }
  .feedback-bar.wrong-fb { background: rgba(239,35,60,0.12); color: var(--c-red); border: 1px solid rgba(239,35,60,0.3); }

  /* ─── RESULT SCREEN ─── */
  #screen-result { gap: 2rem; text-align: center; }

  .result-icon {
    width: 100px; height: 100px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--c-accent), var(--c-accent2));
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 48px;
    box-shadow: 0 0 60px rgba(124,111,255,0.4);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  .result-title { font-size: 2rem; font-weight: 900; }
  .result-score-display {
    font-size: 5rem; font-weight: 900;
    font-family: 'Space Grotesk', sans-serif;
    background: linear-gradient(90deg, var(--c-gold), var(--c-accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .result-meta { color: var(--c-muted); font-size: 1rem; }

  .result-breakdown {
    width: 100%; max-width: 500px;
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 16px;
    overflow: hidden;
  }
  .breakdown-row {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.7rem 1.1rem;
    border-bottom: 1px solid var(--c-border);
    font-size: 0.85rem;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-q { color: var(--c-muted); min-width: 28px; font-size: 0.75rem; }
  .breakdown-song { flex: 1; text-align: left; line-height: 1.3; }
  .breakdown-song span { display: block; font-size: 0.72rem; color: var(--c-muted); }
  .breakdown-pts {
    font-weight: 700; font-size: 0.9rem;
    padding: 3px 10px; border-radius: 99px;
    min-width: 48px; text-align: center;
  }
  .breakdown-pts.hit { background: rgba(6,214,160,0.15); color: var(--c-green); }
  .breakdown-pts.miss { background: rgba(239,35,60,0.1); color: var(--c-red); }

  .replay-btn {
    background: var(--c-surface);
    color: var(--c-text);
    border: 1.5px solid var(--c-border);
    border-radius: 12px;
    padding: 0.75rem 2rem;
    font-size: 1rem; font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .replay-btn:hover { border-color: var(--c-accent); color: var(--c-accent); }

  @media (max-width: 500px) {
    .playlist-grid { grid-template-columns: 1fr; }
    .options-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ─── INTRO ─── -->
<div id="screen-intro" class="screen active">
  <div class="logo-area">
    <div class="logo-icon">🎵</div>
    <div class="logo-title">猜歌大挑戰</div>
    <div class="logo-sub">聽音辨歌 · 十題百分</div>
  </div>

  <div style="text-align:center">
    <div style="font-size:0.8rem;color:var(--c-muted);margin-bottom:1rem;letter-spacing:0.08em">選擇你的歌單</div>
    <div class="playlist-grid">
      <button class="playlist-btn a" onclick="selectPlaylist('A')">
        <div class="playlist-letter">A</div>
        <div class="playlist-name">台灣樂團</div>
        <div class="playlist-desc">獨立／搖滾／民謠</div>
      </button>
      <button class="playlist-btn b" onclick="selectPlaylist('B')">
        <div class="playlist-letter">B</div>
        <div class="playlist-name">KPOP</div>
        <div class="playlist-desc">韓國流行音樂</div>
      </button>
      <button class="playlist-btn c" onclick="selectPlaylist('C')">
        <div class="playlist-letter">C</div>
        <div class="playlist-name">台灣流行</div>
        <div class="playlist-desc">華語主流歌曲</div>
      </button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startGame()" disabled>開始遊戲</button>

  <div style="font-size:0.75rem;color:var(--c-muted);text-align:center;max-width:320px;line-height:1.6">
    🎧 請確保音量開啟<br>
    按 <strong style="color:var(--c-text)">1 2 3 4</strong> 可用鍵盤快速作答
  </div>
</div>

<!-- ─── GAME ─── -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="progress-wrap">
      <div class="progress-label" id="q-label">第 1 / 10 題</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="score-badge">🏆 <span id="score-display">0</span></div>
  </div>

  <div class="player-area">
    <div class="now-playing-label">🎵 正在播放</div>
    <div class="waveform" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <div class="timer-row">
      <div class="timer-circle" id="timer-circle">30</div>
      <div class="hint-text" id="hint-text">聽聽看是哪一首歌？選出正確答案吧！</div>
    </div>
  </div>

  <div class="options-grid" id="options-grid"></div>
  <div class="feedback-bar" id="feedback-bar"></div>

  <div class="hidden-yt" id="yt-container">
    <div id="yt-player"></div>
  </div>
</div>

<!-- ─── RESULT ─── -->
<div id="screen-result" class="screen">
  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-title" id="result-title">遊戲結束！</div>
  <div class="result-score-display"><span id="final-score">0</span> 分</div>
  <div class="result-meta" id="result-meta"></div>
  <div class="result-breakdown" id="result-breakdown"></div>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center">
    <button class="start-btn" onclick="restartSame()">再玩一次</button>
    <button class="replay-btn" onclick="goHome()">換歌單</button>
  </div>
</div>

// ─── STATE ───
let selectedPlaylist = null;
let player = null;
let ytReady = false;
let questions = [];
let currentQ = 0;
let score = 0;
let history = [];
let timerInterval = null;
let timeLeft = 30;
let answered = false;
let currentAnswer = null;

// ─── UI HELPERS ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectPlaylist(key) {
  selectedPlaylist = key;
  document.querySelectorAll('.playlist-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.playlist-btn.' + key.toLowerCase()).classList.add('selected');
  document.getElementById('start-btn').disabled = false;
}

// ─── YOUTUBE API ───
function loadYouTubeAPI() {
  if (document.getElementById('yt-api')) return;
  const tag = document.createElement('script');
  tag.id = 'yt-api';
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  player = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, disablekb: 1 },
    events: {
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED && !answered) {
          timeLeft = 0;
          handleTimeout();
        }
      }
    }
  });
};

loadYouTubeAPI();

// ─── GAME LOGIC ───
function startGame() {
  const pl = PLAYLISTS[selectedPlaylist];
  const pool = [...pl.songs];
  shuffle(pool);
  questions = pool.slice(0, 10);
  currentQ = 0;
  score = 0;
  history = [];
  showScreen('screen-game');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  clearInterval(timerInterval);

  const correct = questions[currentQ];
  currentAnswer = correct;

  // build 3 wrong choices from same playlist
  const pl = PLAYLISTS[selectedPlaylist];
  const others = pl.songs.filter(s => s.title !== correct.title);
  shuffle(others);
  const choices = [correct, ...others.slice(0, 3)];
  shuffle(choices);

  // update header
  document.getElementById('q-label').textContent = `第 ${currentQ + 1} / 10 題`;
  document.getElementById('progress-fill').style.width = `${(currentQ / 10) * 100}%`;
  document.getElementById('score-display').textContent = score;

  // enable waveform
  document.getElementById('waveform').classList.remove('paused');

  // feedback reset
  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  // hint
  document.getElementById('hint-text').textContent = '仔細聆聽，選出正確答案！';

  // render options
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const keys = ['1', '2', '3', '4'];
  choices.forEach((song, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.title = song.title;
    btn.innerHTML = `
      <div class="option-key">${keys[i]}</div>
      <div class="option-song">
        <div class="option-title">${song.title}</div>
        <div class="option-artist">${song.artist}</div>
      </div>`;
    btn.onclick = () => submitAnswer(song.title, correct.title);
    grid.appendChild(btn);
  });

  // timer
  timeLeft = 30;
  updateTimer(30);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimeout();
    }
  }, 1000);

  // play music
  playTrack(correct.ytId);
}

function playTrack(ytId) {
  if (player && ytReady && player.loadVideoById) {
    player.loadVideoById({ videoId: ytId, startSeconds: 15 });
    player.setVolume(100);
  }
}

function stopMusic() {
  if (player && ytReady && player.stopVideo) {
    player.stopVideo();
  }
  document.getElementById('waveform').classList.add('paused');
}

function updateTimer(t) {
  const el = document.getElementById('timer-circle');
  el.textContent = t;
  el.classList.toggle('urgent', t <= 10);
}

function submitAnswer(chosen, correct) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  stopMusic();

  const isCorrect = chosen === correct;
  const pts = isCorrect ? 10 : 0;
  score += pts;
  history.push({ q: currentQ + 1, song: correct, artist: currentAnswer.artist, correct: isCorrect, pts });

  // style buttons
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.title === correct) btn.classList.add('correct');
    else if (btn.dataset.title === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  });

  const fb = document.getElementById('feedback-bar');
  if (isCorrect) {
    fb.className = 'feedback-bar correct-fb show';
    fb.textContent = '🎉 答對了！＋10 分';
    document.getElementById('hint-text').textContent = `正確答案：${correct}`;
  } else {
    fb.className = 'feedback-bar wrong-fb show';
    fb.textContent = `❌ 答錯了！正確答案是「${correct}」`;
    document.getElementById('hint-text').textContent = `這首歌是「${correct}」，下次加油！`;
  }

  document.getElementById('score-display').textContent = score;

  setTimeout(nextQuestion, 2200);
}

function handleTimeout() {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  stopMusic();

  const correct = currentAnswer.title;
  history.push({ q: currentQ + 1, song: correct, artist: currentAnswer.artist, correct: false, pts: 0 });

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.title === correct) btn.classList.add('correct');
    else btn.classList.add('reveal');
  });

  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar wrong-fb show';
  fb.textContent = `⏰ 時間到！正確答案是「${correct}」`;
  document.getElementById('hint-text').textContent = `這首歌是「${correct}」`;

  setTimeout(nextQuestion, 2200);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 10) {
    showResults();
  } else {
    loadQuestion();
  }
}

// ─── RESULTS ───
function showResults() {
  stopMusic();
  document.getElementById('final-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';

  const correct = history.filter(h => h.correct).length;
  let icon = '😢', title = '繼續加油！';
  if (score >= 90) { icon = '🏆'; title = '完美！你是音樂天才！'; }
  else if (score >= 70) { icon = '🎉'; title = '很厲害！'; }
  else if (score >= 50) { icon = '🎵'; title = '還不錯喔！'; }
  else if (score >= 30) { icon = '💪'; title = '繼續加油！'; }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-meta').textContent = `答對 ${correct} / 10 題 · 歌單：${PLAYLISTS[selectedPlaylist].name}`;

  const bd = document.getElementById('result-breakdown');
  bd.innerHTML = history.map(h => `
    <div class="breakdown-row">
      <div class="breakdown-q">Q${h.q}</div>
      <div class="breakdown-song">${h.song}<span>${h.artist}</span></div>
      <div class="breakdown-pts ${h.correct ? 'hit' : 'miss'}">${h.correct ? '+10' : '0'}</div>
    </div>`).join('');

  showScreen('screen-result');
}

function restartSame() { startGame(); }
function goHome() {
  selectedPlaylist = null;
  document.querySelectorAll('.playlist-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('start-btn').disabled = true;
  showScreen('screen-intro');
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (['1','2','3','4'].includes(e.key)) {
    const idx = parseInt(e.key) - 1;
    const btns = document.querySelectorAll('.option-btn');
    if (btns[idx] && !btns[idx].disabled) btns[idx].click();
  }
});

// ─── UTILS ───
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
