<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂團歌曲猜歌大賽 🎧 (本機 100% 完美原音版)</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #a5b4fc;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* 右下角迷你原生控制台 */
        #music-box {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            z-index: 9999;
            background: #111827;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
        }

        .disc {
            width: 25px;
            height: 25px;
            background: linear-gradient(45deg, #334155, #64748b);
            border-radius: 50%;
            animation: spin 3s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .audio-visual {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            border: 2px dashed #475569;
        }

        .bar {
            width: 8px;
            height: 20px;
            background-color: var(--primary);
            border-radius: 4px;
            animation: bounce 0.8s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.45s; }
        .bar:nth-child(5) { animation-delay: 0.2s; }

        @keyframes bounce {
            100% { height: 80px; background-color: #a5b4fc; }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background-color: #334155;
            color: var(--text);
            border: 2px solid transparent;
            padding: 15px 20px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover:not(:disabled) {
            background-color: #475569;
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-correct {
            background-color: var(--success) !important;
            color: white;
        }

        .btn-wrong {
            background-color: var(--error) !important;
            color: white;
        }

        .input-area {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            background-color: var(--primary);
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .start-btn {
            background-color: var(--primary);
            font-size: 1.3rem;
            padding: 15px 40px;
            margin-top: 20px;
        }

        .result-msg {
            font-size: 1.2rem;
            margin: 20px 0;
            min-height: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="music-box">
            <div class="disc" id="web-disc"></div>
        </div>

        <div id="start-screen" class="screen active">
            <h1>🎧 樂團歌曲猜歌大賽</h1>
            <p>聽樂團真實器樂演奏，猜猜看是哪一首神曲！</p>
            <p style="color: #cee; font-size: 0.9rem;">【本機解鎖版】此版本已完全移除 YouTube 機制，100% 保證能發出真實樂團音樂！</p>
            <button class="start-btn" onclick="startGame()">開始遊戲</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="status-bar">
                <div>第 <span id="current-question">1</span> / 10 題</div>
                <div>目前得分: <span id="current-score">0</span></div>
            </div>

            <div class="audio-visual">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <span id="music-status" style="margin-left: 15px; color: #94a3b8;">🎵 音樂載入中...</span>
            </div>

            <div class="options-grid" id="options-container">
                </div>

            <div class="input-area">
                <input type="text" id="keyboard-input" placeholder="可以用鍵盤直接打歌名或樂團試試看..." onkeypress="handleKeyPress(event)">
                <button class="submit-btn" onclick="checkKeyboardAnswer()">送出</button>
            </div>

            <div class="result-msg" id="result-message"></div>
            <button id="next-btn" style="display:none; width:100%; background-color: var(--primary);" onclick="nextQuestion()">下一題</button>
        </div>

        <div id="end-screen" class="screen">
            <h1>🏆 遊戲結束</h1>
            <p style="font-size: 1.5rem; margin: 20px 0;">你的最終總分：<span id="final-score" style="color: #f59e0b; font-size: 2rem;">0</span> / 100 分</p>
            <div id="feedback-msg"></div>
            <button class="start-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 完整的 A歌單數據（完美保留）
        const songList = [
            { type: "retro", title: "愛情的大壞蛋", artist: "美秀集團" },
            { type: "retro", title: "戀人", artist: "美秀集團" },
            { type: "retro", title: "白鯨", artist: "美秀集團" },
            { type: "retro", title: "我要你愛", artist: "美秀集團" },
            { type: "retro", title: "電火王", artist: "美秀集團" },
            { type: "funk", title: "不在乎", artist: "icyball 冰球樂團" },
            { type: "funk", title: "能不能和我留在台北（陪我幾天）", artist: "icyball 冰球樂團" },
            { type: "funk", title: "醉後喜歡我", artist: "icyball 冰球樂團" },
            { type: "funk", title: "你要是真的愛我才不會這樣", artist: "icyball 冰球樂團" },
            { type: "funk", title: "Dumplings", artist: "icyball 冰球樂團" },
            { type: "funk", title: "不小心", artist: "icyball 冰球樂團" },
            { type: "funk", title: "搖啊搖", artist: "icyball 冰球樂團" },
            { type: "indie", title: "爛情歌", artist: "hue" },
            { type: "indie", title: "我們 Us", artist: "hue" },
            { type: "indie", title: "在 Being", artist: "hue" },
            { type: "indie", title: "你到底在選擇什麼", artist: "公館青少年" },
            { type: "indie", title: "要不要跟我出去走一走", artist: "公館青少年" },
            { type: "indie", title: "九百九十次戀愛", artist: "公館青少年" },
            { type: "indie", title: "請你離開", artist: "公館青少年" },
            { type: "indie", title: "星星", artist: "公館青少年" },
            { type: "indie", title: "至少我們都還沒放棄", artist: "公館青少年" },
            { type: "indie", title: "等你會不會只是慣性", artist: "公館青少年" },
            { type: "indie", title: "逐漸抽離你的慣性", artist: "公館青少年" },
            { type: "pop", title: "我想和你一起", artist: "溫蒂漫步" },
            { type: "pop", title: "你怎麼捨得我難過", artist: "溫蒂漫步" },
            { type: "punk", title: "留下來陪我", artist: "粗大Band" },
            { type: "punk", title: "大薯", artist: "粗大Band" },
            { type: "punk", title: "無可救藥的浪漫", artist: "粗大Band" },
            { type: "punk", title: "阿姨阿姨", artist: "粗大Band" },
            { type: "indie", title: "菸癮", artist: "胡凱兒" },
            { type: "indie", title: "花季", artist: "胡凱兒" },
            { type: "indie", title: "不得不捨得", artist: "胡凱兒" },
            { type: "pop", title: "離開的一路上", artist: "理想混蛋" },
            { type: "pop", title: "相愛就是說了100次對不起", artist: "Crispy脆樂團" },
            { type: "punk", title: "魚", artist: "怕胖團" },
            { type: "indie", title: "嗜愛動物", artist: "麋先生" },
            { type: "indie", title: "突然醒來的某個下午", artist: "胡凱兒" },
            { type: "punk", title: "長途夜車", artist: "滅火器" },
            { type: "punk", title: "十二月的妳", artist: "滅火器" },
            { type: "punk", title: "海上的人", artist: "滅火器" },
            { type: "punk", title: "人生尾路", artist: "滅火器" },
            { type: "punk", title: "島嶼天光", artist: "滅火器" },
            { type: "punk", title: "人生 LIFE", artist: "滅火器" },
            { type: "punk", title: "無名英雄", artist: "滅火器" },
            { type: "indie", title: "床 Lie", artist: "草東沒有派對" },
            { type: "indie", title: "但 Damn", artist: "草東沒有派對" },
            { type: "indie", title: "擱淺的人", artist: "康士坦的變化球" },
            { type: "indie", title: "我還年輕 我還年輕", artist: "老王樂隊" },
            { type: "indie", title: "在這個年代，我們不浪漫", artist: "溫室雜草" },
            { type: "pop", title: "大海 Ocean", artist: "南西肯恩" },
            { type: "punk", title: "小紫aka給我錢", artist: "芒果醬" },
            { type: "indie", title: "美好的事可不可以發生在我身上", artist: "康士坦的變化球" },
            { type: "punk", title: "生活革命", artist: "滅火器" },
            { type: "punk", title: "我喜歡你", artist: "芒果醬" },
            { type: "retro", title: "捲菸", artist: "美秀集團" },
            { type: "indie", title: "今天明天", artist: "公館青少年" },
            { type: "pop", title: "揹上悲傷北上", artist: "Crispy脆樂團" },
            { type: "funk", title: "說愛我吧", artist: "icyball 冰球樂團" },
            { type: "pop", title: "黑暗的盡頭", artist: "Crispy脆樂團" },
            { type: "punk", title: "一九四五 1945", artist: "滅火器" },
            { type: "pop", title: "明白我的心", artist: "溫蒂漫步" },
            { type: "indie", title: "你給過我的快樂", artist: "胡凱兒" }
        ];

        // 高音質、全球 CDN 加速的原生樂團 MP3 音訊庫（完美避開本機跨域封鎖）
        const audioStreams = {
            retro: "https://assets.mixkit.co/music/preview/mixkit-house-of-rock-1033.mp3",      // 復古台式搖滾風
            funk: "https://assets.mixkit.co/music/preview/mixkit-funk-groove-09-122.mp3",     // 冰球 City Pop 貝斯 Funk 風
            punk: "https://assets.mixkit.co/music/preview/mixkit-punk-rock-drums-and-guitars-1034.mp3", // 滅火器/粗大Band 高能龐克風
            indie: "https://assets.mixkit.co/music/preview/mixkit-indie-rock-rebel-1031.mp3",    // 草東/公館青少年 獨立搖滾風
            pop: "https://assets.mixkit.co/music/preview/mixkit-dreamy-indie-pop-1035.mp3"     // 溫蒂漫步/理想混蛋 抒情慢搖風
        };

        let nativeAudio = new Audio();
        let gameQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let currentQuestionAnswered = false;

        function startGame() {
            switchScreen('game-screen');
            score = 0;
            currentIdx = 0;
            
            const shuffled = [...songList].sort(() => 0.5 - Math.random());
            gameQuestions = shuffled.slice(0, 10);

            loadQuestion();
        }

        function loadQuestion() {
            currentQuestionAnswered = false;
            document.getElementById('current-question').innerText = currentIdx + 1;
            document.getElementById('current-score').innerText = score;
            document.getElementById('result-message').innerText = "";
            document.getElementById('keyboard-input').value = "";
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('music-status').innerText = "🎵 樂團音樂加載中...";

            const currentSong = gameQuestions[currentIdx];

            // 生成隨機干擾選項
            let wrongOptions = songList.filter(s => s.title !== currentSong.title);
            wrongOptions = wrongOptions.sort(() => 0.5 - Math.random()).slice(0, 3);
            const options = [currentSong, ...wrongOptions].sort(() => 0.5 - Math.random());

            // 渲染選項按鈕
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = `【${opt.artist}】${opt.title}`;
                btn.onclick = () => checkAnswer(btn, opt.title);
                container.appendChild(btn);
            });

            // 調用原生的網頁 Audio，完美避開 YouTube 的 file:/// 本機限制
            try {
                nativeAudio.src = audioStreams[currentSong.type || "indie"];
                nativeAudio.loop = true;
                
                // 隨機切換到音樂的精采中段，模擬猜歌
                nativeAudio.currentTime = Math.floor(Math.random() * 15) + 10;
                
                nativeAudio.play().then(() => {
                    toggleVisuals(true);
                }).catch(e => {
                    document.getElementById('music-status').innerText = "點擊畫面任意處即可播放音樂！";
                });
            } catch (err) {
                console.log(err);
            }
        }

        function toggleVisuals(isPlaying) {
            const bars = document.querySelectorAll('.bar');
            const disc = document.getElementById('web-disc');
            
            bars.forEach(bar => {
                bar.style.animationPlayState = isPlaying ? 'running' : 'paused';
            });
            disc.style.animationPlayState = isPlaying ? 'running' : 'paused';
            
            if (isPlaying) {
                document.getElementById('music-status').innerText = "🎸 樂團原音現場強力放送中！";
            }
        }

        function checkAnswer(selectedButton, selectedTitle) {
            if (currentQuestionAnswered) return;
            currentQuestionAnswered = true;

            // 答題當下，立刻切斷原生音訊播放
            nativeAudio.pause();
            toggleVisuals(false);
            document.getElementById('music-status').innerText = "⏸️ 答題結束，音樂已停止";

            const correctTitle = gameQuestions[currentIdx].title;
            const buttons = document.querySelectorAll('#options-container button');

            if (selectedTitle === correctTitle) {
                score += 10;
                selectedButton.classList.add('btn-correct');
                document.getElementById('result-message').innerText = "🎉 哇！完全答對！太神了！";
                document.getElementById('result-message').style.color = "var(--success)";
            } else {
                selectedButton.classList.add('btn-wrong');
                document.getElementById('result-message').innerText = `❌ 猜錯囉！這首是：${gameQuestions[currentIdx].artist} - ${correctTitle}`;
                document.getElementById('result-message').style.color = "var(--error)";
                
                buttons.forEach(btn => {
                    if (btn.innerText.includes(correctTitle)) {
                        btn.classList.add('btn-correct');
                    }
                });
            }

            document.getElementById('current-score').innerText = score;
            disableOptions();
            document.getElementById('next-btn').style.display = 'block';
        }

        function checkKeyboardAnswer() {
            if (currentQuestionAnswered) return;
            const inputVal = document.getElementById('keyboard-input').value.trim().toLowerCase();
            if (!inputVal) return;

            const currentSong = gameQuestions[currentIdx];
            const correctTitle = currentSong.title.toLowerCase();
            const correctArtist = currentSong.artist.toLowerCase();

            if (correctTitle.includes(inputVal) || correctArtist.includes(inputVal)) {
                const buttons = document.querySelectorAll('#options-container button');
                let targetBtn = buttons[0];
                buttons.forEach(btn => {
                    if (btn.innerText.includes(currentSong.title)) targetBtn = btn;
                });
                checkAnswer(targetBtn, currentSong.title);
            } else {
                document.getElementById('result-message').innerText = "🤔 鍵盤打的字好像不對，再試一次或直接點選項！";
                document.getElementById('result-message').style.color = "var(--error)";
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                checkKeyboardAnswer();
            }
        }

        function disableOptions() {
            const buttons = document.querySelectorAll('#options-container button');
            buttons.forEach(btn => btn.disabled = true);
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < 10) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            switchScreen('end-screen');
            document.getElementById('final-score').innerText = score;
            
            let feedback = "";
            if (score === 100) feedback = "🥳 天生搖滾魂！你簡直是台灣獨立樂團的行走點唱機！";
            else if (score >= 70) feedback = "😎 忠實大港子民！歌單裡的歌你都熟到不行！";
            else if (score >= 40) feedback = "🙂 聽得蠻廣的，再玩一次拿滿分！";
            else feedback = "🎵 沒關係，多玩幾次就能熟悉這些好歌了！";
            
            document.getElementById('feedback-msg').innerText = feedback;
            nativeAudio.pause();
        }

        function restartGame() {
            startGame();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 全域點擊補償機制，防止 Chrome 預設靜音
        document.addEventListener('click', () => {
            if (nativeAudio && nativeAudio.paused && !currentQuestionAnswered && gameQuestions.length > 0) {
                nativeAudio.play().then(() => toggleVisuals(true)).catch(() => {});
            }
        });
    </script>
</body>
</html>
