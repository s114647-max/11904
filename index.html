<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽歌名猜樂團 挑戰賽</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --primary: #38bdf8;
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid #1e293b;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 20px;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        p.intro {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .btn {
            background-color: var(--primary);
            color: #0b0f19;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
        }

        /* 遊戲中面板 */
        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            font-size: 1rem;
            color: var(--text-muted);
            border-bottom: 2px solid #1e293b;
            padding-bottom: 12px;
        }

        .quiz-box {
            margin-bottom: 40px;
        }

        .quiz-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .song-title {
            font-size: 2.2rem;
            font-weight: bold;
            color: #f43f5e;
            text-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (max-width: 500px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-btn {
            background-color: #1e293b;
            color: var(--text-main);
            border: 2px solid #334155;
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #334155;
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .option-btn.correct {
            background-color: rgba(16, 185, 129, 0.2) !important;
            border-color: var(--correct) !important;
            color: #34d399 !important;
        }

        .option-btn.wrong {
            background-color: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--wrong) !important;
            color: #f87171 !important;
        }

        .hidden {
            display: none !important;
        }

        .score-display {
            font-size: 4.5rem;
            font-weight: bold;
            color: #fbbf24;
            margin: 20px 0;
        }

        .feedback-text {
            font-size: 1.25rem;
            margin-bottom: 35px;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 開始畫面 -->
        <div id="start-screen">
            <h1>看歌名猜樂團</h1>
            <p class="intro">純粹考驗直覺！畫面將顯示一首來自歌單中的精選曲目，請在四個選項中，點選正確演唱該歌曲的樂團。<br><br><strong>共 10 題 ‧ 一題 10 分 ‧ 滿分 100 分</strong></p>
            <button class="btn" onclick="startGame()">開始遊戲</button>
        </div>

        <!-- 遊戲畫面 -->
        <div id="game-screen" class="hidden">
            <div class="game-header">
                <span id="question-number">第 1 / 10 題</span>
                <span id="current-score">目前分數: 0 分</span>
            </div>
            
            <div class="quiz-box">
                <div class="quiz-label">請問這首歌是哪個樂團的歌？</div>
                <div class="song-title" id="song-title">歌名載入中...</div>
            </div>

            <div class="options-grid" id="options-container">
                <!-- 四個樂團選項 -->
            </div>
        </div>

        <!-- 結束畫面 -->
        <div id="result-screen" class="hidden">
            <h1>挑戰結束！</h1>
            <div class="score-display" id="final-score">0</div>
            <p class="feedback-text" id="feedback-text">評語載入中...</p>
            <button class="btn" onclick="restartGame()">再挑戰一次</button>
        </div>
    </div>

    <script>
        // 只保留歌名與正確樂團對應
        const quizData = [
            {
                song: "《愛情的大壞蛋》",
                answer: "美秀集團",
                options: ["美秀集團", "怕胖團", "芒果醬", "粗大Band"]
            },
            {
                song: "《能不能和我在台北》",
                answer: "icyball 冰球樂團",
                options: ["icyball 冰球樂團", "溫蒂漫步", "南西肯恩", "hue"]
            },
            {
                song: "《菸癮》",
                answer: "Who Cares 胡凱兒",
                options: ["Who Cares 胡凱兒", "康士坦的變化球", "老王樂隊", "溫室雜草"]
            },
            {
                song: "《你到底在選擇什麼》",
                answer: "公館青少年",
                options: ["公館青少年", "理想混蛋", "Crispy脆樂團", "五月天"]
            },
            {
                song: "《我想和你一起》",
                answer: "溫蒂漫步",
                options: ["溫蒂漫步", "icyball 冰球樂團", "美秀集團", "南西肯恩"]
            },
            {
                song: "《大薯》",
                answer: "粗大Band",
                options: ["粗大Band", "怕胖團", "公館青少年", "芒果醬"]
            },
            {
                song: "《魚》",
                answer: "怕胖團",
                options: ["怕胖團", "草東沒有派對", "滅火器", "康士坦的變化球"]
            },
            {
                song: "《長途夜車》",
                answer: "滅火器",
                options: ["滅火器", "老王樂隊", "Who Cares 胡凱兒", "告五人"]
            },
            {
                song: "《爛情歌》",
                answer: "hue",
                options: ["hue", "溫室雜草", "草東沒有派對", "康士坦的變化球"]
            },
            {
                song: "《小紫aka給我錢》",
                answer: "芒果醬",
                options: ["芒果醬", "美秀集團", "粗大Band", "公館青少年"]
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            currentQuestionIndex = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            canAnswer = true;
            const currentQuiz = quizData[currentQuestionIndex];
            
            document.getElementById('question-number').innerText = `第 ${currentQuestionIndex + 1} / 10 題`;
            document.getElementById('current-score').innerText = `目前分數: ${score} 分`;
            
            document.getElementById('song-title').innerText = currentQuiz.song;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // 打亂選項位置
            const shuffledOptions = [...currentQuiz.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.innerText = option;
                button.onclick = () => selectOption(button, option);
                optionsContainer.appendChild(button);
            });
        }

        function selectOption(selectedButton, selectedAnswer) {
            if (!canAnswer) return;
            canAnswer = false;

            const currentQuiz = quizData[currentQuestionIndex];
            const allButtons = document.querySelectorAll('.option-btn');

            if (selectedAnswer === currentQuiz.answer) {
                selectedButton.classList.add('correct');
                score += 10;
                document.getElementById('current-score').innerText = `目前分數: ${score} 分`;
            } else {
                selectedButton.classList.add('wrong');
                allButtons.forEach(btn => {
                    if (btn.innerText === currentQuiz.answer) {
                        btn.classList.add('correct');
                    }
                });
            }

            allButtons.forEach(btn => btn.disabled = true);

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    endGame();
                }
            }, 1200); // 縮短等待時間，讓節奏更明快
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('final-score').innerText = `${score} 分`;

            const feedbackEl = document.getElementById('feedback-text');
            if (score === 100) {
                feedbackEl.innerText = "太厲害了！你對這份歌單的樂團聊若指掌！";
            } else if (score >= 80) {
                feedbackEl.innerText = "很棒！你是個標準的獨立音樂愛好者！";
            } else if (score >= 60) {
                feedbackEl.innerText = "有過關！看來有幾首按太快按錯了？";
            } else {
                feedbackEl.innerText = "看來需要再去多聽幾次巡演囉，加油！";
            }
        }

        function restartGame() {
            startGame();
        }
    </script>
</body>
</html>
