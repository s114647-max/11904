<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜歌遊戲 🎵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent-a: #ff6b35;
    --accent-b: #a855f7;
    --accent-c: #22d3a5;
    --text: #f0f0f5;
    --text-dim: #8888a0;
    --correct: #22d3a5;
    --wrong: #ff4d6d;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 60px;
  }

  /* ── HEADER ── */
  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  h1 {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    text-align: center;
    line-height: 1;
    background: linear-gradient(135deg, #fff 30%, var(--text-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 32px;
  }

  /* ── SELECT SCREEN ── */
  #select-screen { width: 100%; max-width: 480px; }
  .select-title {
    text-align: center;
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 28px;
    letter-spacing: 1px;
  }
  .playlist-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .playlist-card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .playlist-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .playlist-card.card-a::before { background: linear-gradient(135deg, var(--accent-a)15, transparent); }
  .playlist-card.card-b::before { background: linear-gradient(135deg, var(--accent-b)15, transparent); }
  .playlist-card.card-c::before { background: linear-gradient(135deg, var(--accent-c)15, transparent); }
  .playlist-card:hover { transform: translateY(-2px); border-color: #444; }
  .playlist-card:hover::before { opacity: 1; }
  .card-letter {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 700;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .card-a .card-letter { background: var(--accent-a)22; color: var(--accent-a); }
  .card-b .card-letter { background: var(--accent-b)22; color: var(--accent-b); }
  .card-c .card-letter { background: var(--accent-c)22; color: var(--accent-c); }
  .card-info { flex: 1; }
  .card-name { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
  .card-sub { font-size: 13px; color: var(--text-dim); }
  .card-arrow { color: var(--text-dim); font-size: 20px; }

  /* ── GAME SCREEN ── */
  #game-screen { width: 100%; max-width: 560px; display: none; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .playlist-badge {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge-a { background: var(--accent-a)22; color: var(--accent-a); }
  .badge-b { background: var(--accent-b)22; color: var(--accent-b); }
  .badge-c { background: var(--accent-c)22; color: var(--accent-c); }

  .score-display {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  .score-num { font-size: 26px; }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .fill-a { background: var(--accent-a); }
  .fill-b { background: var(--accent-b); }
  .fill-c { background: var(--accent-c); }

  .question-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-align: center;
  }

  /* ── PLAYER ── */
  .player-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
  }
  .vinyl {
    width: 100px;
    height: 100px;
    background: radial-gradient(circle at 50%, #111 20%, #222 40%, #1a1a1a 60%, #222 80%);
    border-radius: 50%;
    margin: 0 auto 16px;
    position: relative;
    border: 3px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .vinyl::after {
    content: '';
    width: 18px;
    height: 18px;
    background: var(--bg);
    border-radius: 50%;
    border: 3px solid #444;
  }
  .vinyl.spinning { animation: spin 2s linear infinite; }
  .vinyl.paused { animation-play-state: paused; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .player-status {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .player-controls { display: flex; justify-content: center; gap: 12px; }
  .ctrl-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: var(--border); transform: scale(1.08); }
  .ctrl-btn.primary {
    width: 54px;
    height: 54px;
    font-size: 20px;
  }
  .ctrl-btn.primary.btn-a { background: var(--accent-a)22; border-color: var(--accent-a)55; color: var(--accent-a); }
  .ctrl-btn.primary.btn-b { background: var(--accent-b)22; border-color: var(--accent-b)55; color: var(--accent-b); }
  .ctrl-btn.primary.btn-c { background: var(--accent-c)22; border-color: var(--accent-c)55; color: var(--accent-c); }

  /* hidden youtube container */
  #yt-container { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }

  /* ── OPTIONS ── */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    color: var(--text);
    font-family: inherit;
  }
  .option-btn:hover:not(:disabled) { border-color: #555; background: var(--surface2); transform: translateY(-1px); }
  .option-btn:disabled { cursor: default; }
  .option-key {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .option-text {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
  }
  .option-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .option-btn.correct { background: var(--correct)18; border-color: var(--correct); }
  .option-btn.wrong { background: var(--wrong)18; border-color: var(--wrong); }
  .option-btn.correct .option-key, .option-btn.wrong .option-key { color: inherit; }

  .hint-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .hint-chip {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  /* ── RESULT MESSAGE ── */
  .result-msg {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 14px;
    display: none;
  }
  .result-msg.correct { background: var(--correct)18; color: var(--correct); display: block; }
  .result-msg.wrong { background: var(--wrong)18; color: var(--wrong); display: block; }

  .next-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: transform 0.15s, opacity 0.15s;
    letter-spacing: 1px;
  }
  .next-btn:hover { transform: translateY(-2px); opacity: 0.92; }
  .next-btn.btn-a { background: var(--accent-a); color: #fff; }
  .next-btn.btn-b { background: var(--accent-b); color: #fff; }
  .next-btn.btn-c { background: var(--accent-c); color: #111; }

  /* ── FINAL SCREEN ── */
  #final-screen { width: 100%; max-width: 480px; display: none; text-align: center; }
  .final-emoji { font-size: 72px; margin-bottom: 16px; }
  .final-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
  .final-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .final-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; }
  .breakdown {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    text-align: left;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-icon { margin-right: 8px; }
  .restart-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: var(--text);
    color: var(--bg);
    transition: opacity 0.15s;
    letter-spacing: 1px;
  }
  .restart-btn:hover { opacity: 0.85; }

  /* keyboard hint */
  .kbd-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
  }
  kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 11px;
  }
</style>
</head>

    </div>
    <div class="playlist-card card-b" onclick="startGame('B')">

      </div>
      <div class="card-arrow">›</div>
    </div>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="game-screen">
  <div class="top-bar">
    <span class="playlist-badge" id="game-badge">A</span>
    <div class="score-display">分數 <span class="score-num" id="score-num">0</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <p class="question-label">第 <span id="q-num">1</span> 題，共 10 題</p>

  <div class="player-box">
    <div class="vinyl" id="vinyl-disc">🎵</div>
    <p class="player-status" id="player-status">載入中…</p>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="rewind()" title="重播片段">↺</button>
      <button class="ctrl-btn primary" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="skipAhead()" title="快進 5 秒">→</button>
    </div>
  </div>

  <div class="hint-row" id="hint-row">
    <span class="hint-chip" id="hint-duration">⏱ 0:00</span>
    <span class="hint-chip" id="hint-artist" style="display:none">🎤 ?</span>
  </div>

  <div class="options-grid" id="options-grid"></div>
  <div class="result-msg" id="result-msg"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
  <p class="kbd-hint">鍵盤快捷鍵：<kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> 選答案 ｜ <kbd>Space</kbd> 播放/暫停</p>
</div>

<!-- ── FINAL SCREEN ── -->
<div id="final-screen">
  <div class="final-emoji" id="final-emoji">🏆</div>
  <div class="final-title">遊戲結束！</div>
  <div class="final-score" id="final-score">0</div>
  <div class="final-sub">分 / 100 分</div>
  <div class="breakdown" id="breakdown"></div>
  <button class="restart-btn" onclick="goBack()">⟳ 重新開始</button>
</div>

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let currentPlaylist = null;
let questions = [];
let currentQ = 0;
let score = 0;
let answered = false;
let history = [];
let ytPlayer = null;
let ytReady = false;
let isPlaying = false;
let currentSong = null;

// ═══════════════════════════════════════════════
//  YOUTUBE API
// ═══════════════════════════════════════════════
window.onYouTubeIframeAPIReady = function () {
  ytPlayer = new YT.Player('yt-player', {
    height: '1',
    width: '1',
    playerVars: { autoplay: 0, controls: 0, disablekb: 1, playsinline: 1 },
    events: {
      onReady: () => { ytReady = true; if (pendingLoad) loadSong(pendingLoad.id, pendingLoad.start); },
      onStateChange: (e) => {
        const vinyl = document.getElementById('vinyl-disc');
        if (e.data === YT.PlayerState.PLAYING) {
          vinyl.className = 'vinyl spinning';
          document.getElementById('play-btn').textContent = '⏸';
          isPlaying = true;
          startTimer();
        } else {
          vinyl.className = 'vinyl';
          document.getElementById('play-btn').textContent = '▶';
          isPlaying = false;
        }
      }
    }
  });
};

let pendingLoad = null;
function loadSong(videoId, startSec) {
  if (!ytReady) { pendingLoad = { id: videoId, start: startSec }; return; }
  pendingLoad = null;
  ytPlayer.loadVideoById({ videoId, startSeconds: startSec });
  ytPlayer.playVideo();
  document.getElementById('player-status').textContent = '🎵 正在播放…';
}

let timerInterval = null;
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!ytPlayer || !isPlaying) return;
    const t = ytPlayer.getCurrentTime() || 0;
    const start = currentSong ? currentSong.start : 0;
    const elapsed = Math.max(0, t - start);
    const m = Math.floor(elapsed / 60), s = Math.floor(elapsed % 60);
    document.getElementById('hint-duration').textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
    // After 30s, reveal artist hint
    if (elapsed >= 30 && !document.getElementById('hint-artist').style.display !== 'none') {
      document.getElementById('hint-artist').style.display = '';
      document.getElementById('hint-artist').textContent = `🎤 ${currentSong.artist}`;
    }
  }, 500);
}

function togglePlay() {
  if (!ytPlayer) return;
  if (isPlaying) { ytPlayer.pauseVideo(); }
  else { ytPlayer.playVideo(); }
}
function rewind() {
  if (!ytPlayer || !currentSong) return;
  ytPlayer.seekTo(currentSong.start, true);
  ytPlayer.playVideo();
}
function skipAhead() {
  if (!ytPlayer) return;
  ytPlayer.seekTo((ytPlayer.getCurrentTime() || 0) + 5, true);
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(type) {
  currentPlaylist = PLAYLISTS[type];
  const pool = shuffle(currentPlaylist.songs).slice(0, 10);
  questions = pool;
  currentQ = 0;
  score = 0;
  history = [];

  // UI
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('final-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';

  const badge = document.getElementById('game-badge');
  badge.textContent = type + ' · ' + currentPlaylist.name;
  badge.className = 'playlist-badge badge-' + currentPlaylist.accent;

  const pf = document.getElementById('progress-fill');
  pf.className = 'progress-fill fill-' + currentPlaylist.accent;

  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn btn-' + currentPlaylist.accent;

  const pb = document.getElementById('play-btn');
  pb.className = 'ctrl-btn primary btn-' + currentPlaylist.accent;

  loadQuestion();
}

function loadQuestion() {
  answered = false;
  clearInterval(timerInterval);
  const q = questions[currentQ];
  currentSong = q;

  // Update progress
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('score-num').textContent = score;
  document.getElementById('progress-fill').style.width = ((currentQ / 10) * 100) + '%';

  // Reset UI
  document.getElementById('result-msg').className = 'result-msg';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('hint-duration').textContent = '⏱ 0:00';
  document.getElementById('hint-artist').style.display = 'none';
  document.getElementById('player-status').textContent = '載入中…';
  document.getElementById('vinyl-disc').className = 'vinyl';

  // Build options: 1 correct + 3 distractors from same playlist
  const pool = currentPlaylist.songs.filter(s => s.id !== q.id);
  const distractors = shuffle(pool).slice(0, 3);
  const options = shuffle([q, ...distractors]);

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const keys = ['1', '2', '3', '4'];
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.id = opt.id;
    btn.dataset.title = opt.title;
    btn.innerHTML = `
      <div class="option-key">${keys[i]}</div>
      <div class="option-text">${opt.title}</div>
      <div class="option-sub">${opt.artist}</div>
    `;
    btn.onclick = () => answer(opt.id, q.id, btn);
    grid.appendChild(btn);
  });

  // Load YouTube
  loadSong(q.id, q.start);
}

function answer(selectedId, correctId, btn) {
  if (answered) return;
  answered = true;

  const correct = selectedId === correctId;
  const pts = correct ? 10 : 0;
  score += pts;
  history.push({ q: questions[currentQ], correct });

  // Highlight buttons
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.id === correctId) b.classList.add('correct');
    else if (b === btn && !correct) b.classList.add('wrong');
  });

  // Result message
  const msg = document.getElementById('result-msg');
  if (correct) {
    msg.textContent = `✅ 答對了！+10 分｜《${questions[currentQ].title}》`;
    msg.className = 'result-msg correct';
  } else {
    msg.textContent = `❌ 答錯了！正確答案是《${questions[currentQ].title}》`;
    msg.className = 'result-msg wrong';
  }

  // Stop music
  if (ytPlayer) ytPlayer.stopVideo();
  clearInterval(timerInterval);

  // Show next
  const nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  nb.textContent = currentQ < 9 ? '下一題 →' : '查看結果 🏆';

  document.getElementById('score-num').textContent = score;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 10) { showFinal(); return; }
  loadQuestion();
}

function showFinal() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('final-screen').style.display = 'block';

  const final = document.getElementById('final-score');
  final.textContent = score;

  const pct = score / 100;
  const emoji = pct >= 0.9 ? '🏆' : pct >= 0.7 ? '🎉' : pct >= 0.5 ? '🎵' : '💪';
  document.getElementById('final-emoji').textContent = emoji;

  // Color score by playlist
  final.style.color = `var(--accent-${currentPlaylist.accent})`;

  // Breakdown
  const bd = document.getElementById('breakdown');
  const correct = history.filter(h => h.correct).length;
  bd.innerHTML = `
    <div class="breakdown-row"><span><span class="breakdown-icon">🎵</span>歌單</span><span>${currentPlaylist.name}</span></div>
    <div class="breakdown-row"><span><span class="breakdown-icon">✅</span>答對</span><span>${correct} / 10 題</span></div>
    <div class="breakdown-row"><span><span class="breakdown-icon">❌</span>答錯</span><span>${10 - correct} / 10 題</span></div>
    <div class="breakdown-row"><span><span class="breakdown-icon">⭐</span>最終得分</span><span style="font-weight:700;color:var(--accent-${currentPlaylist.accent})">${score} 分</span></div>
  `;

  if (ytPlayer) ytPlayer.stopVideo();
  clearInterval(timerInterval);
}

function goBack() {
  document.getElementById('final-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'block';
  if (ytPlayer) ytPlayer.stopVideo();
  clearInterval(timerInterval);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (document.getElementById('game-screen').style.display === 'none') return;
  if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (['1','2','3','4'].includes(e.key)) {
    const btns = document.querySelectorAll('.option-btn');
    const idx = parseInt(e.key) - 1;
    if (btns[idx] && !btns[idx].disabled) btns[idx].click();
  }
  if ((e.key === 'Enter' || e.key === 'ArrowRight') && document.getElementById('next-btn').style.display !== 'none') {
    document.getElementById('next-btn').click();
  }
});
</script>
