<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜歌遊戲｜台灣樂團</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.18);
  --text: #f0ece4;
  --muted: #888;
  --accent: #e8c84a;
  --correct: #4caf7d;
  --correct-dim: rgba(76,175,125,0.15);
  --wrong: #e05c5c;
  --wrong-dim: rgba(224,92,92,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 1rem 4rem;
}
.site-header {
  width: 100%; max-width: 720px;
  padding: 2rem 0 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 2rem;
}
.logo-icon {
  width: 44px; height: 44px; background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; color: #111;
}
.site-header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.03em; }
.site-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
.game-wrap { width: 100%; max-width: 720px; }
.scorebar {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 1.25rem;
}
.q-counter { font-size: 13px; color: var(--muted); white-space: nowrap; }
.progress-track { flex:1; height:4px; background:var(--surface2); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:99px; transition:width .4s ease; }
.score-badge { font-size:13px; font-weight:600; color:var(--accent); white-space:nowrap; }

/* YouTube area */
.yt-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  border-radius: var(--radius);
  overflow: hidden;
  background: #000;
  margin-bottom: 1.25rem;
}
.yt-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

/* Overlay — shown before user clicks play */
.yt-overlay {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  background: #111;
  transition: opacity .3s;
}
.yt-overlay.transparent {
  background: transparent;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.yt-overlay.gone { opacity: 0; pointer-events: none; }

.play-big-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--accent);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #111;
  transition: transform .15s, opacity .15s;
  flex-shrink: 0;
}
.play-big-btn:hover { transform: scale(1.08); }
.play-big-btn:active { transform: scale(0.95); }
.overlay-label {
  font-size: 15px; color: rgba(240,236,228,0.6);
  letter-spacing: 0.04em;
}
.overlay-sublabel {
  font-size: 12px; color: rgba(240,236,228,0.35);
}

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.opt-btn {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 14px;
  text-align: left; cursor: pointer;
  color: var(--text); font-size: 14px; line-height: 1.4;
  transition: background .12s, border-color .12s, transform .1s;
  display: flex; align-items: flex-start; gap: 10px;
}
.opt-btn:hover:not(:disabled) { background: #2e2e2e; border-color: var(--border2); }
.opt-btn:active:not(:disabled) { transform: scale(0.98); }
.opt-key {
  background: rgba(255,255,255,0.07);
  border-radius: 4px;
  width: 22px; height: 22px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--muted);
}
.opt-song { font-weight: 500; }
.opt-band { font-size: 12px; color: var(--muted); margin-top: 2px; }
.opt-btn.correct { background: var(--correct-dim); border-color: var(--correct); }
.opt-btn.correct .opt-key { background: var(--correct); color: #111; }
.opt-btn.wrong { background: var(--wrong-dim); border-color: var(--wrong); }
.opt-btn.wrong .opt-key { background: var(--wrong); color: #fff; }
.opt-btn:disabled { cursor: not-allowed; }

.feedback-bar {
  border-radius: var(--radius-sm);
  padding: 13px 18px; font-size: 14px;
  display: none; align-items: center; gap: 10px;
  margin-bottom: 1rem;
}
.feedback-bar.correct { display:flex; background:var(--correct-dim); border:0.5px solid var(--correct); color:var(--correct); }
.feedback-bar.wrong   { display:flex; background:var(--wrong-dim);   border:0.5px solid var(--wrong);   color:var(--wrong); }
.feedback-bar span { color: var(--text); font-size:13px; }

.next-btn {
  background: var(--accent); color: #111;
  border: none; border-radius: var(--radius-sm);
  padding: 13px 32px; font-size: 15px; font-weight: 600;
  cursor: pointer; display: none; margin: 0 auto;
  transition: transform .12s;
}
.next-btn:hover { transform: scale(1.03); }
.next-btn:active { transform: scale(0.97); }
.next-btn.visible { display: block; }

/* screens */
.screen {
  width: 100%; max-width: 720px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 3rem 2rem; text-align: center;
}
.screen h2 { font-size: 24px; font-weight: 600; margin-bottom: .5rem; }
.screen > p { color: var(--muted); font-size: 15px; line-height: 1.7; margin-bottom: 1.5rem; }
.big-score { font-size: 72px; font-weight: 700; color: var(--accent); line-height: 1; margin: 1.5rem 0; }
.rank { font-size: 18px; color: var(--muted); margin-bottom: 1.5rem; }
.start-btn, .restart-btn {
  background: var(--accent); color: #111;
  border: none; border-radius: var(--radius-sm);
  padding: 14px 40px; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: transform .12s;
}
.start-btn:hover, .restart-btn:hover { transform: scale(1.03); }
.keyboard-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: .75rem; }
.hidden { display: none !important; }

.results-list { margin: 1.5rem 0; text-align: left; }
.result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 14px;
}
.result-item:last-child { border-bottom: none; }
.result-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.result-dot.ok { background: var(--correct); }
.result-dot.no { background: var(--wrong); }
.result-band { font-size: 12px; color: var(--muted); margin-top: 1px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-icon">🎵</div>
  <div>
    <h1>台灣樂團猜歌</h1>
    <p>Band Song Quiz · 十題 · 總分 100 分</p>
  </div>
</header>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <h2>準備好了嗎？</h2>
  <p>遊戲共十題，每題播放一段 YouTube MV。<br>
  影片畫面會模糊，只靠耳朵猜歌！<br>
  答題後才揭開畫面確認答案。<br><br>
  鍵盤 A / B / C / D 選答，Enter 下一題。</p>
  <button class="start-btn" onclick="startGame()">開始遊戲</button>
</div>

<!-- GAME AREA -->
<div id="gameArea" class="hidden">
  <div class="game-wrap">
    <div class="scorebar">
      <span class="q-counter" id="qCounter">第 1 / 10 題</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="score-badge" id="scoreBadge">0 分</span>
    </div>

    <div class="yt-wrap">
      <iframe id="ytFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <!-- Overlay: before click = solid dark, after click = blur -->
      <div class="yt-overlay" id="ytOverlay">
        <button class="play-big-btn" id="playBtn" onclick="userClickPlay()">▶</button>
        <span class="overlay-label">點擊播放，開始聆聽</span>
        <span class="overlay-sublabel">影片會模糊，只聽聲音猜歌</span>
      </div>
    </div>

    <div class="card">
      <div class="options-grid" id="optionsGrid"></div>
    </div>

    <div class="feedback-bar" id="feedbackBar">
      <strong id="feedbackIcon">✓</strong>
      <span id="feedbackText"></span>
    </div>

    <div style="text-align:center;">
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
    </div>
    <p class="keyboard-hint">鍵盤：A B C D 選答 · Enter / N 下一題</p>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen hidden" id="endScreen">
  <h2>遊戲結束！</h2>
  <div class="big-score" id="finalScore">0</div>
  <div class="rank" id="finalRank"></div>
  <p id="finalMsg"></p>
  <div class="results-list" id="resultsList"></div>
  <button class="restart-btn" onclick="restartGame()">再玩一次</button>
</div>

<script>
const SONGS = [
  { song:'愛情的大壞蛋', band:'美秀集團',           yt:'BnMuQvQyxdY', start:15 },
  { song:'戀人',         band:'美秀集團',           yt:'QxXYCJV2Lf0', start:20 },
  { song:'我要你愛',     band:'美秀集團',           yt:'3fEJpqGdoMw', start:10 },
  { song:'電火王',       band:'美秀集團',           yt:'0WDQZ7Y3Rew', start:18 },
  { song:'捲菸',         band:'美秀集團',           yt:'S4JLJVVjevI', start:12 },
  { song:'不在乎',       band:'icyball 冰球樂團',   yt:'aIhsZ4PdGT4', start:10 },
  { song:'能不能和我留在台北', band:'icyball 冰球樂團', yt:'Ef3kY8TqRAo', start:10 },
  { song:'醉後喜歡我',   band:'icyball 冰球樂團',   yt:'P_ZKqTYZnbA', start:15 },
  { song:'搖啊搖',       band:'icyball 冰球樂團',   yt:'7vXa3f0lmFI', start:10 },
  { song:'你到底在選擇什麼', band:'公館青少年 GGteens', yt:'gZGf2dPqjq4', start:12 },
  { song:'要不要跟我出去走一走', band:'公館青少年 GGteens', yt:'WFo5E3fJbLk', start:10 },
  { song:'逐漸抽離你的慣性', band:'公館青少年 GGteens', yt:'WA7FHBHaBMI', start:15 },
  { song:'我想和你一起', band:'溫蒂漫步 Wendy Wander', yt:'2I3V-kBBh5U', start:20 },
  { song:'留下來陪我',   band:'粗大Band',           yt:'u7G3RPEK0W8', start:15 },
  { song:'大薯',         band:'粗大Band',           yt:'GyCFwOqjpBc', start:10 },
  { song:'菸癮',         band:'Who Cares 胡凱兒',   yt:'VrQjV0UzPTI', start:25 },
  { song:'花季',         band:'Who Cares 胡凱兒',   yt:'zDxVzGl9rms', start:10 },
  { song:'離開的一路上', band:'理想混蛋 Bestards',   yt:'DpBLw17q1WY', start:20 },
  { song:'相愛就是說了100次對不起', band:'Crispy脆樂團', yt:'PfcKDO2HB5w', start:15 },
  { song:'揹上悲傷北上', band:'Crispy脆樂團',       yt:'y9lbSmPOSF8', start:10 },
  { song:'黑暗的盡頭',   band:'Crispy脆樂團',       yt:'1nS_LLQIG2k', start:10 },
  { song:'魚',           band:'怕胖團 PAPUN BAND',  yt:'EGjSQNKbbA0', start:10 },
  { song:'嗜愛動物',     band:'麋先生 MIXER',       yt:'TjsNKsTr_IY', start:20 },
  { song:'長途夜車',     band:'滅火器 Fire EX.',    yt:'V8s81RKEWLE', start:10 },
  { song:'島嶼天光',     band:'滅火器 Fire EX.',    yt:'Fvh28b-Cdi4', start:10 },
  { song:'人生尾路',     band:'滅火器 Fire EX.',    yt:'hJPmrKMO2Hs', start:20 },
  { song:'床',           band:'草東沒有派對',       yt:'sLrDyRrH3FY', start:15 },
  { song:'但',           band:'草東沒有派對',       yt:'P0a7PL-fvSs', start:10 },
  { song:'擱淺的人',     band:'康士坦的變化球',     yt:'HJQv0r-nGfE', start:15 },
  { song:'美好的事可不可以發生在我身上', band:'康士坦的變化球', yt:'5EDGbD_JCKA', start:20 },
  { song:'我還年輕我還年輕', band:'老王樂隊',       yt:'hG0JHn6BSQU', start:15 },
  { song:'在這個年代，我們不浪漫', band:'溫室雜草 Easy Weeds', yt:'w6qEUz30T5Q', start:15 },
  { song:'大海',         band:'南西肯恩 NeciKen',   yt:'SJyTVpIm0jA', start:20 },
  { song:'小紫aka給我錢', band:'芒果醬 Mango Jump', yt:'9f9W_B2Ts48', start:10 },
  { song:'爛情歌',       band:'hue',               yt:'Xu5b7pQ5Geg', start:15 },
];

const TOTAL_Q = 10;
const POINTS_PER_Q = 10;
const KEYS = ['A','B','C','D'];

let questions = [], current = 0, score = 0, answered = false, results = [];
let videoLoaded = false; // tracks if user has clicked play for this question

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildQuestions() {
  const pool = shuffle(SONGS);
  questions = pool.slice(0, TOTAL_Q).map(answer => {
    const wrong = shuffle(SONGS.filter(s => s !== answer)).slice(0, 3);
    return { answer, opts: shuffle([answer, ...wrong]) };
  });
}

function startGame() {
  buildQuestions();
  current = 0; score = 0; answered = false; results = [];
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameArea').classList.remove('hidden');
  renderQuestion();
}

function restartGame() {
  stopVideo();
  document.getElementById('gameArea').classList.add('hidden');
  startGame();
}

function stopVideo() {
  const frame = document.getElementById('ytFrame');
  frame.src = '';
}

// Called only when user clicks the big play button — satisfies Chrome's autoplay policy
function userClickPlay() {
  if (videoLoaded) return;
  videoLoaded = true;

  const q = questions[current];
  const frame = document.getElementById('ytFrame');
  frame.src = `https://www.youtube.com/embed/${q.answer.yt}?autoplay=1&start=${q.answer.start}&rel=0&modestbranding=1&iv_load_policy=3&fs=0`;

  // switch overlay to blur (transparent) so video audio plays but visuals hidden
  const overlay = document.getElementById('ytOverlay');
  overlay.classList.add('transparent');
  document.getElementById('playBtn').style.display = 'none';
  overlay.querySelector('.overlay-label').textContent = '仔細聆聽，這是哪首歌？';
  overlay.querySelector('.overlay-sublabel').textContent = '答題後畫面才會揭開';
}

function renderQuestion() {
  answered = false;
  videoLoaded = false;

  const q = questions[current];
  document.getElementById('qCounter').textContent = `第 ${current+1} / ${TOTAL_Q} 題`;
  document.getElementById('progressFill').style.width = (current / TOTAL_Q * 100) + '%';
  document.getElementById('scoreBadge').textContent = score + ' 分';
  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('nextBtn').classList.remove('visible');

  // Reset overlay to "before play" state
  stopVideo();
  const overlay = document.getElementById('ytOverlay');
  overlay.classList.remove('transparent', 'gone');
  const playBtn = document.getElementById('playBtn');
  playBtn.style.display = 'flex';
  playBtn.textContent = '▶';
  overlay.querySelector('.overlay-label').textContent = '點擊播放，開始聆聽';
  overlay.querySelector('.overlay-sublabel').textContent = '影片會模糊，只聽聲音猜歌';

  // Render options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-key">${KEYS[i]}</span><span class="opt-text"><div class="opt-song">${opt.song}</div><div class="opt-band">${opt.band}</div></span>`;
    btn.onclick = () => answer(i);
    grid.appendChild(btn);
  });
}

function answer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const isCorrect = q.opts[idx] === q.answer;
  if (isCorrect) score += POINTS_PER_Q;
  results.push({ answer: q.answer, correct: isCorrect });

  // Reveal video
  document.getElementById('ytOverlay').classList.add('gone');

  // Highlight options
  const btns = document.querySelectorAll('.opt-btn');
  const correctIdx = q.opts.indexOf(q.answer);
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedbackBar');
  document.getElementById('feedbackIcon').textContent = isCorrect ? '✓' : '✗';
  document.getElementById('feedbackText').textContent = isCorrect
    ? `答對了！《${q.answer.song}》— ${q.answer.band}`
    : `答錯了。正確答案是《${q.answer.song}》— ${q.answer.band}`;
  fb.className = 'feedback-bar ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('scoreBadge').textContent = score + ' 分';

  const nb = document.getElementById('nextBtn');
  nb.textContent = current + 1 < TOTAL_Q ? '下一題 →' : '看結果 →';
  nb.classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= TOTAL_Q) showEnd();
  else renderQuestion();
}

function showEnd() {
  stopVideo();
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = score + ' 分';

  const ranks = [
    [100, '🏆 完美聽力！', '你根本就是台灣獨立樂團活字典！'],
    [80,  '🎸 樂團通',     '很厲害！你對台灣樂團相當熟悉。'],
    [60,  '🎵 入門玩家',   '不錯喔！繼續多聽台灣樂團的歌吧。'],
    [40,  '🎧 音樂新手',   '有幾首猜對了！繼續加油，再試一次！'],
    [0,   '🌱 初學者',     '台灣有很多好聽的樂團等你探索！'],
  ];
  const [, rank, msg] = ranks.find(([min]) => score >= min);
  document.getElementById('finalRank').textContent = rank;
  document.getElementById('finalMsg').textContent = msg;

  const list = document.getElementById('resultsList');
  list.innerHTML = '';
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <span class="result-dot ${r.correct ? 'ok' : 'no'}"></span>
      <span style="min-width:20px;font-size:12px;color:var(--muted)">Q${i+1}</span>
      <span style="flex:1">
        <div>${r.answer.song}</div>
        <div class="result-band">${r.answer.band}</div>
      </span>
      <span style="font-size:13px;color:${r.correct ? 'var(--correct)' : 'var(--wrong)'}">
        ${r.correct ? '+10' : '0'}
      </span>`;
    list.appendChild(div);
  });
}

document.addEventListener('keydown', e => {
  const key = e.key.toUpperCase();
  const inGame = !document.getElementById('gameArea').classList.contains('hidden');
  if (!inGame) return;
  if (['A','B','C','D'].includes(key) && !answered) answer(KEYS.indexOf(key));
  if ((key === 'ENTER' || key === 'N') && answered) nextQuestion();
});
</script>
</body>
</html>
