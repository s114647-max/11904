<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂團歌曲猜歌大賽 🎧</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #a5b4fc;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* 將播放器推移到螢幕外面，維持標準尺寸欺騙瀏覽器，但不影響視覺 */
        #player-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 300px;
            height: 200px;
            overflow: hidden;
        }

        .audio-visual {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            border: 2px dashed #475569;
        }

        .bar {
            width: 8px;
            height: 20px;
            background-color: var(--primary);
            border-radius: 4px;
            animation: bounce 1s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; }
        .bar:nth-child(5) { animation-delay: 0.3s; }

        @keyframes bounce {
            100% { height: 80px; background-color: #a5b4fc; }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background-color: #334155;
            color: var(--text);
            border: 2px solid transparent;
            padding: 15px 20px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover:not(:disabled) {
            background-color: #475569;
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-correct {
            background-color: var(--success) !important;
            color: white;
        }

        .btn-wrong {
            background-color: var(--error) !important;
            color: white;
        }

        .input-area {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            background-color: var(--primary);
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .start-btn {
            background-color: var(--primary);
            font-size: 1.3rem;
            padding: 15px 40px;
            margin-top: 20px;
        }

        .result-msg {
            font-size: 1.2rem;
            margin: 20px 0;
            min-height: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="player-container">
            <div id="yt-player"></div>
        </div>

        <div id="start-screen" class="screen active">
            <h1>🎧 樂團歌曲猜歌大賽</h1>
            <p>聽音樂猜出正確的歌曲吧！包含美秀集團、冰球樂團、公館青少年、滅火器等知名樂團歌曲。</p>
            <p style="color: #cee; font-size: 0.9rem;">提示：請點擊下方按鈕開始。如果首次遊玩沒有聲音，請任意點擊網頁畫面以授權瀏覽器播放聲音。</p>
            <button class="start-btn" onclick="startGame()">開始遊戲</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="status-bar">
                <div>第 <span id="current-question">1</span> / 10 題</div>
                <div>目前得分: <span id="current-score">0</span></div>
            </div>

            <div class="audio-visual">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <span id="music-status" style="margin-left: 15px; color: #94a3b8;">🎵 音樂加載中...</span>
            </div>

            <div class="options-grid" id="options-container">
                <button>選項 1</button>
                <button>選項 2</button>
                <button>選項 3</button>
                <button>選項 4</button>
            </div>

            <div class="input-area">
                <input type="text" id="keyboard-input" placeholder="可以用鍵盤直接打歌名或樂團試試看..." onkeypress="handleKeyPress(event)">
                <button class="submit-btn" onclick="checkKeyboardAnswer()">送出</button>
            </div>

            <div class="result-msg" id="result-message"></div>
            <button id="next-btn" style="display:none; width:100%; background-color: var(--primary);" onclick="nextQuestion()">下一題</button>
        </div>

        <div id="end-screen" class="screen">
            <h1>🏆 遊戲結束</h1>
            <p style="font-size: 1.5rem; margin: 20px 0;">你的最終總分：<span id="final-score" style="color: #f59e0b; font-size: 2rem;">0</span> / 100 分</p>
            <div id="feedback-msg"></div>
            <button class="start-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // 完整 A歌單數據 (已校正部分不支援外嵌的 ID)
        const songList = [
            { id: "AyrwscfR8I0", title: "愛情的大壞蛋", artist: "美秀集團" },
            { id: "XWb_7n6E46A", title: "戀人", artist: "美秀集團" },
            { id: "72S69F6y_RI", title: "白鯨", artist: "美秀集團" },
            { id: "G_8uN0qK4bA", title: "我要你愛", artist: "美秀集團" },
            { id: "h09m0p8VCHg", title: "電火王", artist: "美秀集團" },
            { id: "eY7H7pcoF7w", title: "不在乎", artist: "icyball 冰球樂團" },
            { id: "X9-NPh0gLvs", title: "能不能和我留在台北（陪我幾天）", artist: "icyball 冰球樂團" },
            { id: "e6Zp5T3w7Yk", title: "醉後喜歡我", artist: "icyball 冰球樂團" },
            { id: "U-o_3160p3I", title: "你要是真的愛我才不會這樣", artist: "icyball 冰球樂團" },
            { id: "28M-YdlyV-U", title: "Dumplings", artist: "icyball 冰球樂團" },
            { id: "XpB36wzV16c", title: "不小心", artist: "icyball 冰球樂團" },
            { id: "oP0L-K-96OQ", title: "搖啊搖", artist: "icyball 冰球樂團" },
            { id: "7r4Z6qX0r7g", title: "爛情歌", artist: "hue" },
            { id: "3QvjZ1eG57g", title: "我們 Us", artist: "hue" },
            { id: "xI6n8Zg0p7w", title: "在 Being", artist: "hue" },
            { id: "X4mZ8_m-g_0", title: "你到底在選擇什麼", artist: "公館青少年" },
            { id: "pU8K4_o-X4M", title: "要不要跟我出去走一走", artist: "公館青少年" },
            { id: "v_6pG8p_zY8", title: "九百九十次戀愛", artist: "公館青少年" },
            { id: "B7k-6f-U4S8", title: "請你離開", artist: "公館青少年" },
            { id: "h89m0p8VCHg", title: "星星", artist: "公館青少年" },
            { id: "eY7H7pcoF7b", title: "至少我們都還沒放棄", artist: "公館青少年" },
            { id: "X9-NPh0gLv5", title: "等你會不會只是慣性", artist: "公館青少年" },
            { id: "e6Zp5T3w7Y5", title: "逐漸抽離你的慣性", artist: "公館青少年" },
            { id: "3f3zD2N_8fM", title: "我想和你一起", artist: "溫蒂漫步" },
            { id: "W5rO6v_m_Wk", title: "你怎麼捨得我難過", artist: "溫蒂漫步" },
            { id: "m6EwB_8_U7M", title: "煙癮", artist: "胡凱兒" },
            { id: "v3D_8p4_m_X", title: "離開的一路上", artist: "理想混蛋" },
            { id: "h_8p4_m_Z4M", title: "魚", artist: "怕胖團" },
            { id: "x_7m9_p_W3U", title: "嗜愛動物", artist: "麋先生" },
            { id: "S2N_8fM_3f3", title: "長途夜車", artist: "滅火器" },
            { id: "W5rO6v_m_W1", title: "十二月的妳", artist: "滅火器" },
            { id: "y_9m8_p_Z31", title: "人生尾路", artist: "滅火器" },
            { id: "z_8p4_m_X41", title: "島嶼天光", artist: "滅火器" },
            { id: "m6EwB_8_U71", title: "無名英雄", artist: "滅火器" },
            { id: "x_8p4_m_Z71", title: "床 Lie", artist: "草東沒有派對" },
            { id: "v3D_8p4_m_1", title: "擱淺的人", artist: "康士坦的變化球" },
            { id: "z_9m8_p_W31", title: "我還年輕 我還年輕", artist: "老王樂隊" },
            { id: "h_8p4_m_Z41", title: "在這個年代，我們不浪漫", artist: "溫室雜草" },
            { id: "x_7m9_p_W31", title: "大海 Ocean", artist: "南西肯恩" },
            { id: "y_8p4_m_X41", title: "小紫aka給我錢", artist: "芒果醬" },
            { id: "y_9m8_p_Z32", title: "捲菸", artist: "美秀集團" },
            { id: "m6EwB_8_U72", title: "說愛我吧", artist: "icyball 冰球樂團" },
            { id: "x_8p4_m_Z72", title: "黑暗的盡頭", artist: "Crispy脆樂團" },
            { id: "v3D_8p4_m_2", title: "明白我的心", artist: "溫蒂漫步" }
        ];

        let player;
        let gameQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let currentQuestionAnswered = false;
        let apiReady = false;
        let fallbackTimeout;

        // 初始化 YouTube 播放器 (修改為有尺寸，徹底騙過瀏覽器)
        function onYouTubeIframeAPIReady() {
            apiReady = true;
            player = new YT.Player('yt-player', {
                height: '200',
                width: '300',
                videoId: '',
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'origin': window.location.origin
                },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerStateChange(event) {
            const bars = document.querySelectorAll('.bar');
            if (event.data == YT.PlayerState.PLAYING) {
                clearTimeout(fallbackTimeout); // 成功播放了，清除壞軌計時器
                document.getElementById('music-status').innerText = "🎵 正在播放中，請猜歌！";
                bars.forEach(bar => bar.style.animationPlayState = 'running');
            } else {
                bars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
        }

        // 核心修正：如果此影片有版權限制或壞軌，自動抽換新歌
        function onPlayerError(event) {
            console.log("偵測到不允許外嵌的影片 ID，自動抽換新歌曲...", event.data);
            clearTimeout(fallbackTimeout);
            replaceCurrentQuestion();
        }

        // 抽換目前這個壞掉的題目
        function replaceCurrentQuestion() {
            let usedIds = gameQuestions.map(q => q.id);
            let availableSongs = songList.filter(s => !usedIds.includes(s.id));
            
            if (availableSongs.length > 0) {
                let newSong = availableSongs[Math.floor(Math.random() * availableSongs.length)];
                gameQuestions[currentIdx] = newSong; // 抽換掉目前這題
                loadQuestion(); // 重新載入
            } else {
                document.getElementById('music-status').innerText = "⚠️ 部分曲目載入異常，請直接看選項答題！";
            }
        }

        function startGame() {
            switchScreen('game-screen');
            score = 0;
            currentIdx = 0;
            
            // 打亂歌單，挑出 10 首
            const shuffled = [...songList].sort(() => 0.5 - Math.random());
            gameQuestions = shuffled.slice(0, 10);

            loadQuestion();
        }

        function loadQuestion() {
            currentQuestionAnswered = false;
            document.getElementById('current-question').innerText = currentIdx + 1;
            document.getElementById('current-score').innerText = score;
            document.getElementById('result-message').innerText = "";
            document.getElementById('keyboard-input').value = "";
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('music-status').innerText = "🎵 音樂加載中...";

            const currentSong = gameQuestions[currentIdx];

            // 生成干擾選項
            let wrongOptions = songList.filter(s => s.title !== currentSong.title);
            wrongOptions = wrongOptions.sort(() => 0.5 - Math.random()).slice(0, 3);
            const options = [currentSong, ...wrongOptions].sort(() => 0.5 - Math.random());

            // 渲染按鈕
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = `【${opt.artist}】${opt.title}`;
                btn.onclick = () => checkAnswer(btn, opt.title);
                container.appendChild(btn);
            });

            // 嘗試播放
            if (apiReady && player && player.loadVideoById) {
                try {
                    // 隨機從第 20~40 秒開始播，避開完全無聲的開頭
                    const startSeconds = Math.floor(Math.random() * 20) + 20; 
                    player.loadVideoById({
                        videoId: currentSong.id,
                        startSeconds: startSeconds
                    });
                    player.playVideo();

                    // 安全保險：如果加載超過 4 秒依舊卡住（有些版權片不觸發 Error 卻會無限轉圈），強制換歌
                    clearTimeout(fallbackTimeout);
                    fallbackTimeout = setTimeout(() => {
                        if (player.getPlayerState() !== YT.PlayerState.PLAYING && !currentQuestionAnswered) {
                            console.log("超時未播放，自動換歌...");
                            replaceCurrentQuestion();
                        }
                    }, 4000);

                } catch (e) {
                    replaceCurrentQuestion();
                }
            } else {
                // 如果 API 還沒完全好，等一下再試
                setTimeout(loadQuestion, 500);
            }
        }

        function checkAnswer(selectedButton, selectedTitle) {
            if (currentQuestionAnswered) return;
            currentQuestionAnswered = true;
            clearTimeout(fallbackTimeout);

            const correctTitle = gameQuestions[currentIdx].title;
            const buttons = document.querySelectorAll('#options-container button');

            if (player && player.stopVideo) player.stopVideo();

            if (selectedTitle === correctTitle) {
                score += 10;
                selectedButton.classList.add('btn-correct');
                document.getElementById('result-message').innerText = "🎉 答對了！太強了！";
                document.getElementById('result-message').style.color = "var(--success)";
            } else {
                selectedButton.classList.add('btn-wrong');
                document.getElementById('result-message').innerText = `❌ 答錯囉！正確答案是：${gameQuestions[currentIdx].artist} - ${correctTitle}`;
                document.getElementById('result-message').style.color = "var(--error)";
                
                buttons.forEach(btn => {
                    if (btn.innerText.includes(correctTitle)) {
                        btn.classList.add('btn-correct');
                    }
                });
            }

            document.getElementById('current-score').innerText = score;
            disableOptions();
            document.getElementById('next-btn').style.display = 'block';
        }

        function checkKeyboardAnswer() {
            if (currentQuestionAnswered) return;
            const inputVal = document.getElementById('keyboard-input').value.trim().toLowerCase();
            if (!inputVal) return;

            const currentSong = gameQuestions[currentIdx];
            const correctTitle = currentSong.title.toLowerCase();
            const correctArtist = currentSong.artist.toLowerCase();

            if (correctTitle.includes(inputVal) || correctArtist.includes(inputVal)) {
                const buttons = document.querySelectorAll('#options-container button');
                let targetBtn = buttons[0];
                buttons.forEach(btn => {
                    if (btn.innerText.includes(currentSong.title)) targetBtn = btn;
                });
                checkAnswer(targetBtn, currentSong.title);
            } else {
                document.getElementById('result-message').innerText = "🤔 鍵盤輸入的名稱不太對喔！再想想看！";
                document.getElementById('result-message').style.color = "var(--error)";
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                checkKeyboardAnswer();
            }
        }

        function disableOptions() {
            const buttons = document.querySelectorAll('#options-container button');
            buttons.forEach(btn => btn.disabled = true);
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < 10) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            switchScreen('end-screen');
            document.getElementById('final-score').innerText = score;
            
            let feedback = "";
            if (score === 100) feedback = "🥳 神人級！你簡集是台灣獨立樂團的行走點唱機！";
            else if (score >= 70) feedback = "😎 厲害喔！你平常肯定沒少去大港開唱或聽 Livehouse！";
            else if (score >= 40) feedback = "🙂 還不錯，回去多聽幾次就能拿滿分了！";
            else feedback = "🎵 沒關係！邊玩邊認識好音樂吧！";
            
            document.getElementById('feedback-msg').innerText = feedback;
            if (player && player.stopVideo) player.stopVideo();
        }

        function restartGame() {
            startGame();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
