<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂團歌曲猜歌大賽 🎧</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #a5b4fc;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* 隱藏 YouTube 播放器，只聽聲音 */
        #player-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }

        .audio-visual {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            border: 2px dashed #475569;
        }

        .bar {
            width: 8px;
            height: 20px;
            background-color: var(--primary);
            border-radius: 4px;
            animation: bounce 1s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; }
        .bar:nth-child(5) { animation-delay: 0.3s; }

        @keyframes bounce {
            100% { height: 80px; background-color: #a5b4fc; }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background-color: #334155;
            color: var(--text);
            border: 2px solid transparent;
            padding: 15px 20px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover:not(:disabled) {
            background-color: #475569;
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-correct {
            background-color: var(--success) !important;
            color: white;
        }

        .btn-wrong {
            background-color: var(--error) !important;
            color: white;
        }

        .input-area {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            background-color: var(--primary);
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .start-btn {
            background-color: var(--primary);
            font-size: 1.3rem;
            padding: 15px 40px;
            margin-top: 20px;
        }

        .result-msg {
            font-size: 1.2rem;
            margin: 20px 0;
            min-height: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 隱藏的 YouTube 播放器 -->
        <div id="player-container">
            <div id="yt-player"></div>
        </div>

        <!-- 1. 開始畫面 -->
        <div id="start-screen" class="screen active">
            <h1>🎧 樂團歌曲猜歌大賽</h1>
            <p>聽音樂猜出正確的歌曲吧！包含美秀集團、冰球樂團、公館青少年、滅火器等知名樂團歌曲。</p>
            <p style="color: #cee; font-size: 0.9rem;">提示：你可以用滑鼠點擊選項，或是直接在輸入框用鍵盤打字答題！</p>
            <button class="start-btn" onclick="startGame()">開始遊戲</button>
        </div>

        <!-- 2. 遊戲主畫面 -->
        <div id="game-screen" class="screen">
            <div class="status-bar">
                <div>第 <span id="current-question">1</span> / 10 題</div>
                <div>目前得分: <span id="current-score">0</span></div>
            </div>

            <div class="audio-visual">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <span id="music-status" style="margin-left: 15px; color: #94a3b8;">🎵 音樂加載中...</span>
            </div>

            <!-- 滑鼠點擊選項區 -->
            <div class="options-grid" id="options-container">
                <button onclick="checkAnswer(0)">選項 1</button>
                <button onclick="checkAnswer(1)">選項 2</button>
                <button onclick="checkAnswer(3)">選項 3</button>
                <button onclick="checkAnswer(4)">選項 4</button>
            </div>

            <!-- 鍵盤輸入答題區 -->
            <div class="input-area">
                <input type="text" id="keyboard-input" placeholder="可以用鍵盤直接打歌名或樂團試試看..." onkeypress="handleKeyPress(event)">
                <button class="submit-btn" onclick="checkKeyboardAnswer()">送出</button>
            </div>

            <div class="result-msg" id="result-message"></div>
            <button id="next-btn" style="display:none; width:100%; background-color: var(--primary);" onclick="nextQuestion()">下一題</button>
        </div>

        <!-- 3. 結算畫面 -->
        <div id="end-screen" class="screen">
            <h1>🏆 遊戲結束</h1>
            <p style="font-size: 1.5rem; margin: 20px 0;">你的最終總分：<span id="final-score" style="color: #f59e0b; font-size: 2rem;">0</span> / 100 分</p>
            <div id="feedback-msg"></div>
            <button class="start-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <!-- 載入 YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

            { id: "W5rO6v_m_W2", title: "生活革命", artist: "滅火器" },

            { id: "y_9m8_p_Z32", title: "捲菸", artist: "美秀集團" },
            { id: "z_8p4_m_X42", title: "今天明天", artist: "公館青少年" },
            { id: "w_7m9_p_Y42", title: "揹上悲傷北上", artist: "Crispy脆樂團" },
            { id: "m6EwB_8_U72", title: "說愛我吧", artist: "icyball 冰球樂團" },
            { id: "x_8p4_m_Z72", title: "黑暗的盡頭", artist: "Crispy脆樂團" },
            { id: "y_7m9_p_W42", title: "一九四五 1945", artist: "滅火器" },
            { id: "v3D_8p4_m_2", title: "明白我的心", artist: "溫蒂漫步" },
            { id: "z_9m8_p_W32", title: "你給過我的快樂", artist: "胡凱兒" }
        ];

        let player;
        let gameQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let currentQuestionAnswered = false;

        // YouTube API 準備就緒時自動呼叫
       // YouTube API 準備就緒時自動呼叫
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '200', // 改成正常尺寸，欺騙瀏覽器
                width: '300',  // 改成正常尺寸，欺騙瀏覽器
                videoId: '',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerStateChange(event) {
            const bars = document.querySelectorAll('.bar');
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('music-status').innerText = "🎵 正在播放中，請猜歌！";
                bars.forEach(bar => bar.style.animationPlayState = 'running');
            } else {
                bars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
        }

        function onPlayerError(event) {
            console.log("播放出錯，自動跳下一首", event.data);
            document.getElementById('music-status').innerText = "⚠️ 播放音訊異常，請點選答案！";
        }

        // 開始遊戲：從歌單隨機撈出 10 題
        function startGame() {
            switchScreen('game-screen');
            score = 0;
            currentIdx = 0;
            
            // 洗牌演算法隨機排序歌單
            const shuffled = [...songList].sort(() => 0.5 - Math.random());
            gameQuestions = shuffled.slice(0, 10); // 取前10首

            loadQuestion();
        }

        // 載入題目
        function loadQuestion() {
            currentQuestionAnswered = false;
            document.getElementById('current-question').innerText = currentIdx + 1;
            document.getElementById('current-score').innerText = score;
            document.getElementById('result-message').innerText = "";
            document.getElementById('keyboard-input').value = "";
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('music-status').innerText = "🎵 音樂加載中...";

            const currentSong = gameQuestions[currentIdx];

            // 隨機抽選另外 3 個干擾選項
            let wrongOptions = songList.filter(s => s.title !== currentSong.title);
            wrongOptions = wrongOptions.sort(() => 0.5 - Math.random()).slice(0, 3);

            // 合併並打亂選項
            const options = [currentSong, ...wrongOptions].sort(() => 0.5 - Math.random());

            // 渲染選項按鈕
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = `【${opt.artist}】${opt.title}`;
                btn.onclick = () => checkAnswer(btn, opt.title);
                container.appendChild(btn);
            });

            // 播放歌曲（利用 YouTube 播放特定 ID 歌曲）
            if (player && player.loadVideoById) {
                // 隨機從歌曲前 30 秒至 1 分鐘的地方開始播，增加難度
                const startSeconds = Math.floor(Math.random() * 40) + 10; 
                player.loadVideoById({
                    videoId: currentSong.id,
                    startSeconds: startSeconds
                });
                player.playVideo();
            }
        }

        // 檢查按鈕點擊答案
        function checkAnswer(selectedButton, selectedTitle) {
            if (currentQuestionAnswered) return;
            currentQuestionAnswered = true;

            const correctTitle = gameQuestions[currentIdx].title;
            const buttons = document.querySelectorAll('#options-container button');

            // 停止播放音樂
            if (player && player.stopVideo) player.stopVideo();

            if (selectedTitle === correctTitle) {
                score += 10;
                selectedButton.classList.add('btn-correct');
                document.getElementById('result-message').innerText = "🎉 答對了！太厲害了！";
                document.getElementById('result-message').style.color = "var(--success)";
            } else {
                selectedButton.classList.add('btn-wrong');
                document.getElementById('result-message').innerText = `❌ 答錯囉！正確答案是：${gameQuestions[currentIdx].artist} - ${correctTitle}`;
                document.getElementById('result-message').style.color = "var(--error)";
                
                // 顯示出正確的按鈕
                buttons.forEach(btn => {
                    if (btn.innerText.includes(correctTitle)) {
                        btn.classList.add('btn-correct');
                    }
                });
            }

            document.getElementById('current-score').innerText = score;
            disableOptions();
            document.getElementById('next-btn').style.display = 'block';
        }

        // 檢查鍵盤輸入答案 (可模糊配對歌名或樂團名)
        function checkKeyboardAnswer() {
            if (currentQuestionAnswered) return;
            const inputVal = document.getElementById('keyboard-input').value.trim().toLowerCase();
            if (!inputVal) return;

            const currentSong = gameQuestions[currentIdx];
            const correctTitle = currentSong.title.toLowerCase();
            const correctArtist = currentSong.artist.toLowerCase();

            // 只要輸入的字有包含在歌名或樂團名內，就算對（鍵盤輸入放寬標準）
            if (correctTitle.includes(inputVal) || correctArtist.includes(inputVal)) {
                // 找出對應的按鈕來套用正確樣式
                const buttons = document.querySelectorAll('#options-container button');
                let targetBtn = buttons[0];
                buttons.forEach(btn => {
                    if (btn.innerText.includes(currentSong.title)) targetBtn = btn;
                });
                checkAnswer(targetBtn, currentSong.title);
            } else {
                // 如果打錯，直接隨便塞一個不對的當錯
                document.getElementById('result-message').innerText = "鍵盤輸入錯誤！再猜猜看或直接點選項！";
                document.getElementById('result-message').style.color = "var(--error)";
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                checkKeyboardAnswer();
            }
        }

        function disableOptions() {
            const buttons = document.querySelectorAll('#options-container button');
            buttons.forEach(btn => btn.disabled = true);
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < 10) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        // 結束遊戲，結算總分
        function endGame() {
            switchScreen('end-screen');
            document.getElementById('final-score').innerText = score;
            
            let feedback = "";
            if (score === 100) feedback = "🥳 神人級！你簡直是台灣獨立樂團的行走點唱機！";
            else if (score >= 70) feedback = "😎 厲害喔！你平常肯定沒少去大港開唱或聽 Livehouse！";
            else if (score >= 40) feedback = "🙂 還不錯，歌單裡有很多好歌，回去多聽幾次就能拿滿分了！";
            else feedback = "🎵 沒關係！這份歌單每一首都是神曲，邊玩邊認識好音樂吧！";
            
            document.getElementById('feedback-msg').innerText = feedback;
            if (player && player.stopVideo) player.stopVideo();
        }

        function restartGame() {
            startGame();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
