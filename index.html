<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的歌單 × 隨機播放</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: rgba(255,255,255,0.06);
    --accent: #c8a96e;
    --accent2: #7b9cce;
    --text: #e8e4dc;
    --muted: #6b6870;
    --highlight: rgba(200,169,110,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: .45;
  }

  /* ── Now Playing banner ── */
  #now-playing-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: transform 0.4s cubic-bezier(.16,1,.3,1);
  }

  .np-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: pulse-dot 1.6s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .4; transform: scale(.7); }
  }

  .np-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: .18em;
    color: var(--accent);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .np-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .np-artist {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ── Player modal ── */
  #player-wrap {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  #yt-frame {
    width: 320px;
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,.7), 0 0 0 1px var(--border);
    opacity: 0;
    transform: translateY(20px) scale(0.96);
    transition: opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1);
    pointer-events: none;
  }
  #yt-frame.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }
  #yt-frame iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }

  #player-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: .08em;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s;
  }
  .ctrl-btn:hover {
    background: var(--highlight);
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-btn.primary {
    background: var(--accent);
    color: #0a0a0f;
    border-color: var(--accent);
    font-weight: 700;
  }
  .ctrl-btn.primary:hover {
    background: #d9bc84;
    border-color: #d9bc84;
    color: #0a0a0f;
  }

  /* ── Main layout ── */
  .page-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 110px 32px 120px;
  }

  /* ── Header ── */
  .site-header {
    margin-bottom: 64px;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: .22em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp .6s .1s forwards;
  }
  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.8rem, 6vw, 5.2rem);
    line-height: 1.05;
    letter-spacing: -.02em;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fadeUp .7s .2s forwards;
  }
  .site-sub {
    margin-top: 18px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 440px;
    opacity: 0;
    animation: fadeUp .7s .35s forwards;
  }
  .stat-row {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    opacity: 0;
    animation: fadeUp .7s .45s forwards;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    color: var(--muted);
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Shuffle hero btn ── */
  .shuffle-hero {
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp .7s .55s forwards;
  }
  #shuffle-btn {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: 14px 36px;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color .3s;
  }
  #shuffle-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform .35s cubic-bezier(.16,1,.3,1);
  }
  #shuffle-btn:hover::before { transform: translateX(0); }
  #shuffle-btn:hover { color: #0a0a0f; }
  #shuffle-btn span { position: relative; z-index: 1; }

  /* ── Artist sections ── */
  .artist-section {
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp .6s forwards;
  }

  .artist-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 6px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .artist-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    color: var(--text);
  }
  .artist-name-en {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .1em;
  }
  .artist-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-left: auto;
    letter-spacing: .12em;
  }

  /* ── Track list ── */
  .track-list { list-style: none; }
  .track-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .2s;
    position: relative;
  }
  .track-item:hover { background: var(--highlight); }
  .track-item.active {
    background: var(--highlight);
  }
  .track-item.active .track-title { color: var(--accent); }

  .track-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
  }
  .track-item.active .track-num { display: none; }
  .track-playing-icon {
    display: none;
    width: 22px;
    flex-shrink: 0;
    justify-content: center;
  }
  .track-item.active .track-playing-icon { display: flex; }

  .bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    animation: eq 0.9s ease-in-out infinite;
  }
  .bar:nth-child(1) { height: 10px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 14px; animation-delay: .15s; }
  .bar:nth-child(3) { height: 8px;  animation-delay: .3s; }
  .bar-wrap { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
  @keyframes eq {
    0%,100% { transform: scaleY(1); }
    50%      { transform: scaleY(.3); }
  }

  .track-title {
    flex: 1;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.45;
    transition: color .2s;
  }
  .track-duration {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ── Divider ── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 52px 0 40px;
    opacity: .35;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-mark {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── Footer ── */
  .site-footer {
    margin-top: 80px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--muted);
    text-align: center;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Responsive ── */
  @media(max-width: 600px) {
    .page-wrap { padding: 100px 18px 140px; }
    #player-wrap { bottom: 16px; right: 16px; }
    #yt-frame { width: 280px; height: 158px; }
    .site-title { font-size: 2.4rem; }
  }
</style>
</head>

});

// Update stat
document.getElementById('artist-count').textContent = Object.keys(artistMap).length;
document.getElementById('total-count').textContent = songs.length;

// Render sections
function renderSections() {
  const container = document.getElementById('track-sections');
  const artists = Object.keys(artistMap);
  artists.forEach((artist, ai) => {
    const section = document.createElement('div');
    section.className = 'artist-section';
    section.style.animationDelay = (0.05 * ai + 0.6) + 's';
    section.id = 'artist-' + ai;

    const tracks = artistMap[artist];
    const [zh, en] = artist.split(' ').reduce((acc, w) => {
      if (/^[A-Za-z]/.test(w)) { acc[1] += (acc[1] ? ' ' : '') + w; }
      else { acc[0] += w; }
      return acc;
    }, ['', '']);

    section.innerHTML = `
      <div class="artist-header">
        <span class="artist-name">${zh || artist}</span>
        ${en ? `<span class="artist-name-en">${en}</span>` : ''}
        <span class="artist-count">${tracks.length} 首</span>
      </div>
      <ul class="track-list" id="list-${ai}"></ul>
    `;

    container.appendChild(section);

    const ul = document.getElementById('list-' + ai);
    tracks.forEach((s, ti) => {
      const li = document.createElement('li');
      li.className = 'track-item';
      li.id = 'track-' + s.idx;
      li.onclick = () => playSong(s.idx);
      li.innerHTML = `
        <span class="track-num">${(ti+1).toString().padStart(2,'0')}</span>
        <div class="track-playing-icon">
          <div class="bar-wrap">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
        </div>
        <span class="track-title">${s.title}</span>
        <span class="track-duration">${s.dur}</span>
      `;
      ul.appendChild(li);
    });
  });
}
renderSections();

// YouTube IFrame API
window.onYouTubeIframeAPIReady = function () {
  ytApiReady = true;
  ytPlayer = new YT.Player('yt-container', {
    height: '180', width: '320',
    playerVars: { autoplay: 1, controls: 1, rel: 0, modestbranding: 1 },
    events: {
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED) nextSong();
      }
    }
  });
};

const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

function playSong(idx) {
  // deactivate old
  if (currentIdx >= 0) {
    const old = document.getElementById('track-' + currentIdx);
    if (old) old.classList.remove('active');
  }
  currentIdx = idx;
  const song = songs[idx];

  // activate new
  const el = document.getElementById('track-' + idx);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // update bar
  document.getElementById('np-title').textContent = song.title;
  document.getElementById('np-artist').textContent = song.artist;

  // play
  if (ytPlayer && ytApiReady && ytPlayer.loadVideoById) {
    ytPlayer.loadVideoById(song.id);
  } else {
    setTimeout(() => { if (ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(song.id); }, 800);
  }

  // show player
  document.getElementById('yt-frame').classList.add('visible');
}

function shufflePlay() {
  const idx = Math.floor(Math.random() * songs.length);
  playSong(idx);
}

function nextSong() {
  const idx = (currentIdx + 1) % songs.length;
  playSong(idx);
}

function prevSong() {
  const idx = (currentIdx - 1 + songs.length) % songs.length;
  playSong(idx);
}

function toggleVideo() {
  videoVisible = !videoVisible;
  const frame = document.getElementById('yt-frame');
  const btn = document.getElementById('toggle-video-btn');
  if (videoVisible) {
    frame.style.display = 'block';
    btn.textContent = '▪ 隱藏畫面';
  } else {
    frame.style.display = 'none';
    btn.textContent = '▶ 顯示畫面';
  }
}

// Auto-shuffle on page load
window.addEventListener('load', () => {
  setTimeout(shufflePlay, 800);
});
</script>
