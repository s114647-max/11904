<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜歌遊戲｜台灣樂團</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.18);
  --text: #f0ece4;
  --muted: #888;
  --accent: #e8c84a;
  --correct: #4caf7d;
  --correct-dim: rgba(76,175,125,0.15);
  --wrong: #e05c5c;
  --wrong-dim: rgba(224,92,92,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 1rem 4rem;
}
.site-header {
  width: 100%; max-width: 680px;
  padding: 2rem 0 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 2rem;
}
.logo-icon {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; color: #111;
}
.site-header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.03em; }
.site-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
.scorebar {
  width: 100%; max-width: 680px;
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 1.25rem;
}
.q-counter { font-size: 13px; color: var(--muted); white-space: nowrap; }
.progress-track { flex:1; height:4px; background:var(--surface2); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:99px; transition:width .4s ease; }
.score-badge { font-size:13px; font-weight:600; color:var(--accent); white-space:nowrap; }
.card {
  width: 100%; max-width: 680px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.spotify-wrap {
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: #000;
  margin-bottom: 1.25rem;
  position: relative;
  min-height: 80px;
}
.spotify-wrap iframe {
  display: block;
  width: 100%;
  border: none;
}
.spotify-placeholder {
  display: flex; align-items: center; justify-content: center;
  min-height: 80px;
  color: var(--muted); font-size: 14px;
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.opt-btn {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 14px;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  font-size: 14px;
  line-height: 1.4;
  transition: background .12s, border-color .12s, transform .1s;
  display: flex; align-items: flex-start; gap: 10px;
}
.opt-btn:hover:not(:disabled) { background: #2e2e2e; border-color: var(--border2); }
.opt-btn:active:not(:disabled) { transform: scale(0.98); }
.opt-key {
  background: rgba(255,255,255,0.07);
  border-radius: 4px;
  width: 22px; height: 22px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--muted);
}
.opt-song { font-weight: 500; }
.opt-band { font-size: 12px; color: var(--muted); margin-top: 2px; }
.opt-btn.correct { background: var(--correct-dim); border-color: var(--correct); }
.opt-btn.correct .opt-key { background: var(--correct); color: #111; }
.opt-btn.wrong { background: var(--wrong-dim); border-color: var(--wrong); }
.opt-btn.wrong .opt-key { background: var(--wrong); color: #fff; }
.opt-btn:disabled { cursor: not-allowed; }
.feedback-bar {
  width: 100%; max-width: 680px;
  border-radius: var(--radius-sm);
  padding: 13px 18px;
  font-size: 14px;
  display: none; align-items: center; gap: 10px;
  margin-bottom: 1rem;
}
.feedback-bar.correct { display:flex; background:var(--correct-dim); border:0.5px solid var(--correct); color:var(--correct); }
.feedback-bar.wrong { display:flex; background:var(--wrong-dim); border:0.5px solid var(--wrong); color:var(--wrong); }
.feedback-bar span { color: var(--text); font-size:13px; }
.next-btn {
  background: var(--accent); color: #111;
  border: none; border-radius: var(--radius-sm);
  padding: 13px 32px; font-size: 15px; font-weight: 600;
  cursor: pointer; display: none; margin: 0 auto;
  transition: transform .12s;
}
.next-btn:hover { transform: scale(1.03); }
.next-btn:active { transform: scale(0.97); }
.next-btn.visible { display: block; }
.screen {
  width: 100%; max-width: 680px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 3rem 2rem; text-align: center;
}
.screen h2 { font-size: 24px; font-weight: 600; margin-bottom: .5rem; }
.screen p { color: var(--muted); font-size: 15px; line-height: 1.7; margin-bottom: 1.5rem; }
.screen .big-score { font-size: 72px; font-weight: 700; color: var(--accent); line-height: 1; margin: 1.5rem 0; }
.screen .rank { font-size: 18px; color: var(--muted); margin-bottom: 1.5rem; }
.start-btn, .restart-btn {
  background: var(--accent); color: #111;
  border: none; border-radius: var(--radius-sm);
  padding: 14px 40px; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: transform .12s;
}
.start-btn:hover, .restart-btn:hover { transform: scale(1.03); }
.keyboard-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: .75rem; }
.hidden { display: none !important; }
.notice-box {
  width: 100%; max-width: 680px;
  background: rgba(232,200,74,0.08);
  border: 0.5px solid rgba(232,200,74,0.3);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px; color: #c8a830;
  margin-bottom: 1rem;
  line-height: 1.6;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-icon">🎵</div>
  <div>
    <h1>台灣樂團猜歌</h1>
    <p>Band Song Quiz · 十題 · 總分 100 分</p>
  </div>
</header>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <h2>準備好了嗎？</h2>
  <p>透過 Spotify 播放器試聽歌曲，猜出正確的歌名。<br>
  共十題，每題 10 分，滿分 100 分。<br>
  鍵盤 A / B / C / D 選答，Space 可控制播放。</p>
  <button class="start-btn" onclick="startGame()">開始遊戲</button>
</div>

<!-- GAME AREA -->
<div id="gameArea" class="hidden" style="width:100%;max-width:680px;">

  <div class="scorebar">
    <span class="q-counter" id="qCounter">第 1 / 10 題</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="score-badge" id="scoreBadge">0 分</span>
  </div>

  <div class="notice-box" id="noticeBox">
    💡 需要登入 Spotify 才能完整播放；未登入可聽 <strong>30 秒預覽片段</strong>。播放器載入後請稍候，可能需要幾秒鐘。
  </div>

  <div class="card">
    <!-- Spotify embed -->
    <div class="spotify-wrap" id="spotifyWrap">
      <div class="spotify-placeholder" id="spotifyPlaceholder">載入中…</div>
      <iframe id="spotifyFrame" style="display:none;" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <!-- Options -->
    <div class="options-grid" id="optionsGrid"></div>
  </div>

  <div class="feedback-bar" id="feedbackBar">
    <strong id="feedbackIcon">✓</strong>
    <span id="feedbackText"></span>
  </div>

  <div style="text-align:center;">
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
  </div>
  <p class="keyboard-hint">鍵盤快捷鍵：A B C D 選答 · Enter / N 下一題</p>
</div>

<!-- END SCREEN -->
<div class="screen hidden" id="endScreen">
  <h2>遊戲結束！</h2>
  <div class="big-score" id="finalScore">0</div>
  <div class="rank" id="finalRank"></div>
  <p id="finalMsg"></p>
  <button class="restart-btn" onclick="restartGame()">再玩一次</button>
</div>

<script>
const SONGS = [
  { song:'捲菸', band:'美秀集團', id:'7ks6KrwN2DKhEm06X85qEK' },
  { song:'愛情的大壞蛋', band:'美秀集團', id:'0OmFkWvBbUxXjGMjWoHBnj' },
  { song:'戀人', band:'美秀集團', id:'3BaANp3Pk4gEA4vPJDdRkF' },
  { song:'我要你愛', band:'美秀集團', id:'3uNJHOe5kNb0HJ7tpRzEZo' },
  { song:'電火王', band:'美秀集團', id:'6Wm3oOYZhCEqt1v0qXUNeY' },
  { song:'長途夜車', band:'滅火器 Fire EX.', id:'2DZLyqxPBCziw1YJOWPCjQ' },
  { song:'島嶼天光', band:'滅火器 Fire EX.', id:'4uZrEi9OP8VW1LbBRl61fd' },
  { song:'人生尾路', band:'滅火器 Fire EX.', id:'7bv7M3dxcbrnDOhV11otMb' },
  { song:'床', band:'草東沒有派對', id:'7iNnvOWQSTQPLn5WPu0gdU' },
  { song:'但', band:'草東沒有派對', id:'54hpc7UxPBdpcsC7xFKEWB' },
  { song:'我還年輕我還年輕', band:'老王樂隊', id:'5o48kuQnPwhuRAzO2t0bCU' },
  { song:'能不能和我留在台北', band:'icyball 冰球樂團', id:'4u2nqzrQ3p1EGCFhOw0YR1' },
  { song:'醉後喜歡我', band:'icyball 冰球樂團', id:'1gWS5LE8aPHfJzD5bPFnIj' },
  { song:'搖啊搖', band:'icyball 冰球樂團', id:'4DV0JEJfCgSBsK5TSdCCzL' },
  { song:'我想和你一起', band:'溫蒂漫步 Wendy Wander', id:'5WQHwGYKN3V6QFG9QC5Bvp' },
  { song:'離開的一路上', band:'理想混蛋 Bestards', id:'1J0DkyMzpOYv1D6Hm1oEpv' },
  { song:'相愛就是說了100次對不起', band:'Crispy脆樂團', id:'6NhLFpRzGxvDNM2uxjRqSD' },
  { song:'揹上悲傷北上', band:'Crispy脆樂團', id:'4vI8Vr5FfGmqhm9klbJKPQ' },
  { song:'黑暗的盡頭', band:'Crispy脆樂團', id:'2Fh1VTD9vhJAL0Tm3iVBCq' },
  { song:'嗜愛動物', band:'麋先生 MIXER', id:'1Bg7bFqe8TfXVnGJbN3BpT' },
  { song:'菸癮', band:'Who Cares 胡凱兒', id:'5I5M9DQvMhiJMHGDJZBmxZ' },
  { song:'花季', band:'Who Cares 胡凱兒', id:'3v3K4aaGpGu2pPAlcSF3vA' },
  { song:'擱淺的人', band:'康士坦的變化球', id:'0SKW7Q3G0MkqAXLxRMdIFY' },
  { song:'美好的事可不可以發生在我身上', band:'康士坦的變化球', id:'5BhyM4mYP6wJf35W9r4HQm' },
  { song:'留下來陪我', band:'粗大Band', id:'0JsEDDCbA9IqUGdD0EKTAZ' },
  { song:'魚', band:'怕胖團 PAPUN BAND', id:'1DwFZkrNwFNR2f31j8sLY2' },
  { song:'大海', band:'南西肯恩 NeciKen', id:'2mNPfJ2bLTnzJFWD9ePcmH' },
  { song:'在這個年代，我們不浪漫', band:'溫室雜草 Easy Weeds', id:'5HgbCOJm6k6ypMqH2J2YDw' },
];

const TOTAL_Q = 10;
const POINTS_PER_Q = 10;
const KEYS = ['A','B','C','D'];

let questions = [];
let current = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildQuestions() {
  const pool = shuffle(SONGS);
  questions = pool.slice(0, TOTAL_Q).map(answer => {
    const wrong = shuffle(SONGS.filter(s => s !== answer)).slice(0, 3);
    const opts = shuffle([answer, ...wrong]);
    return { answer, opts };
  });
}

function startGame() {
  buildQuestions();
  current = 0; score = 0; answered = false;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameArea').classList.remove('hidden');
  renderQuestion();
}

function restartGame() {
  clearSpotify();
  startGame();
}

function clearSpotify() {
  const frame = document.getElementById('spotifyFrame');
  frame.src = '';
  frame.style.display = 'none';
  document.getElementById('spotifyPlaceholder').style.display = 'flex';
}

function loadSpotify(trackId) {
  const frame = document.getElementById('spotifyFrame');
  const placeholder = document.getElementById('spotifyPlaceholder');
  placeholder.textContent = '載入中…';
  placeholder.style.display = 'flex';
  frame.style.display = 'none';
  frame.src = `https://open.spotify.com/embed/track/${trackId}?utm_source=generator&theme=0`;
  frame.height = '80';
  frame.onload = () => {
    placeholder.style.display = 'none';
    frame.style.display = 'block';
  };
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qCounter').textContent = `第 ${current+1} / ${TOTAL_Q} 題`;
  document.getElementById('progressFill').style.width = (current / TOTAL_Q * 100) + '%';
  document.getElementById('scoreBadge').textContent = score + ' 分';

  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('nextBtn').classList.remove('visible');

  loadSpotify(q.answer.id);

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-key">${KEYS[i]}</span><span class="opt-text"><div class="opt-song">${opt.song}</div><div class="opt-band">${opt.band}</div></span>`;
    btn.onclick = () => answer(i);
    grid.appendChild(btn);
  });
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = q.opts[idx] === q.answer;
  if (isCorrect) score += POINTS_PER_Q;

  const btns = document.querySelectorAll('.opt-btn');
  const correctIdx = q.opts.indexOf(q.answer);
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedbackBar');
  const fbText = document.getElementById('feedbackText');
  const fbIcon = document.getElementById('feedbackIcon');
  if (isCorrect) {
    fb.className = 'feedback-bar correct';
    fbIcon.textContent = '✓';
    fbText.textContent = `答對了！《${q.answer.song}》— ${q.answer.band}`;
  } else {
    fb.className = 'feedback-bar wrong';
    fbIcon.textContent = '✗';
    fbText.textContent = `答錯了。正確答案是《${q.answer.song}》— ${q.answer.band}`;
  }
  document.getElementById('scoreBadge').textContent = score + ' 分';
  const nb = document.getElementById('nextBtn');
  nb.textContent = current + 1 < TOTAL_Q ? '下一題 →' : '看結果 →';
  nb.classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= TOTAL_Q) { showEnd(); }
  else { renderQuestion(); }
}

function showEnd() {
  clearSpotify();
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = score + ' 分';
  let rank, msg;
  if (score===100) { rank='🏆 完美聽力！'; msg='你根本就是台灣獨立樂團活字典！'; }
  else if (score>=80) { rank='🎸 樂團通'; msg='很厲害！你對台灣樂團相當熟悉。'; }
  else if (score>=60) { rank='🎵 入門玩家'; msg='不錯喔！繼續多聽台灣樂團的歌吧。'; }
  else if (score>=40) { rank='🎧 音樂新手'; msg='有幾首猜對了！繼續加油，再試一次吧！'; }
  else { rank='🌱 初學者'; msg='台灣有很多好聽的樂團等你探索！'; }
  document.getElementById('finalRank').textContent = rank;
  document.getElementById('finalMsg').textContent = msg;
}

document.addEventListener('keydown', e => {
  const key = e.key.toUpperCase();
  if (['A','B','C','D'].includes(key) && !answered) {
    answer(KEYS.indexOf(key));
  }
  if ((key==='ENTER'||key==='N') && answered) {
    nextQuestion();
  }
});
</script>
</body>
</html>
