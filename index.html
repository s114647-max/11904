<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜歌遊戲 × 台灣樂團</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;700&display=swap');

:root {
  --bg: #080c10;
  --surface: #0e1520;
  --card: #131c2a;
  --border: rgba(255,255,255,0.07);
  --cyan: #00e5ff;
  --orange: #ff6b35;
  --green: #39ff7a;
  --red: #ff3860;
  --yellow: #ffd600;
  --text: #e8edf5;
  --muted: #5a6880;
  --glow-cyan: 0 0 20px rgba(0,229,255,0.35);
  --glow-orange: 0 0 20px rgba(255,107,53,0.35);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* scanline overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ─── SCREENS ─── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ─── MENU SCREEN ─── */
#menu-screen {
  position: relative;
  overflow: hidden;
}

.menu-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 30% 60%, rgba(0,229,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 30%, rgba(255,107,53,0.06) 0%, transparent 70%);
}

.menu-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridShift 20s linear infinite;
}
@keyframes gridShift {
  0% { transform: translateY(0); }
  100% { transform: translateY(48px); }
}

.menu-inner {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 24px;
  max-width: 680px;
  width: 100%;
}

.game-title {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(4rem, 12vw, 8rem);
  letter-spacing: .06em;
  line-height: .95;
  background: linear-gradient(135deg, var(--cyan) 0%, #fff 40%, var(--orange) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(0,229,255,0.4));
  animation: titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100% { filter: drop-shadow(0 0 30px rgba(0,229,255,0.4)); }
  50%      { filter: drop-shadow(0 0 50px rgba(0,229,255,0.7)); }
}

.game-subtitle {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px;
  letter-spacing: .3em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-top: 8px;
  opacity: .8;
}

.divider-line {
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  margin: 28px auto;
}

.menu-desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 36px;
  letter-spacing: .05em;
}

.playlist-cards {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.playlist-card {
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  width: 180px;
  cursor: pointer;
  transition: all .3s cubic-bezier(.16,1,.3,1);
  background: var(--card);
  position: relative;
  overflow: hidden;
}
.playlist-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity .3s;
}
.playlist-card.a::before { background: radial-gradient(circle at 50% 0%, rgba(0,229,255,0.15), transparent 70%); }
.playlist-card.b::before { background: radial-gradient(circle at 50% 0%, rgba(255,214,0,0.12), transparent 70%); }
.playlist-card.c::before { background: radial-gradient(circle at 50% 0%, rgba(255,107,53,0.12), transparent 70%); }
.playlist-card:hover::before { opacity: 1; }

.playlist-card.a:hover { border-color: var(--cyan); box-shadow: var(--glow-cyan); transform: translateY(-4px); }
.playlist-card.b:hover { border-color: var(--yellow); box-shadow: 0 0 20px rgba(255,214,0,0.3); transform: translateY(-4px); }
.playlist-card.c:hover { border-color: var(--orange); box-shadow: var(--glow-orange); transform: translateY(-4px); }
.playlist-card.disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

.card-letter {
  font-family: 'Bebas Neue', cursive;
  font-size: 3rem;
  line-height: 1;
  margin-bottom: 8px;
}
.playlist-card.a .card-letter { color: var(--cyan); }
.playlist-card.b .card-letter { color: var(--yellow); }
.playlist-card.c .card-letter { color: var(--orange); }

.card-genre {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px;
  letter-spacing: .15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.card-count {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  font-family: 'Bebas Neue', cursive;
  letter-spacing: .1em;
}
.coming-soon-badge {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 9px;
  letter-spacing: .12em;
  background: var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  color: var(--muted);
  text-transform: uppercase;
}

/* ─── GAME SCREEN ─── */
#game-screen {
  padding: 0;
  justify-content: flex-start;
  position: relative;
  overflow: hidden;
}

.game-bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(0,229,255,0.05) 0%, transparent 60%);
  pointer-events: none;
}

/* HUD */
.hud {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: rgba(8,12,16,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.hud-left { display: flex; align-items: center; gap: 20px; }
.hud-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.4rem;
  letter-spacing: .1em;
  color: var(--cyan);
}
.q-counter {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  color: var(--muted);
  letter-spacing: .1em;
}
.score-display {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.6rem;
  letter-spacing: .1em;
  color: var(--text);
}
.score-display span { color: var(--cyan); }

/* Progress bar */
.progress-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.06);
  z-index: 11;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--orange));
  transition: width .5s ease;
  box-shadow: 0 0 8px var(--cyan);
}

/* Main game area */
.game-main {
  flex: 1;
  width: 100%;
  max-width: 780px;
  margin: 0 auto;
  padding: 32px 24px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Player area */
.player-area {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  overflow: hidden;
}
.player-area::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(0,229,255,0.05), transparent);
}

.player-icon {
  width: 64px; height: 64px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 1.8rem;
  position: relative;
  overflow: hidden;
}
.vinyl-spin {
  animation: spin 3s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.player-info { flex: 1; position: relative; }
.player-label {
  font-family: 'Bebas Neue', cursive;
  font-size: .85rem;
  letter-spacing: .2em;
  color: var(--cyan);
  margin-bottom: 6px;
}
.player-status {
  font-size: 15px;
  color: var(--text);
  font-weight: 700;
}
.player-hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* Sound wave */
.wave-bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 28px;
}
.wave-bar {
  width: 4px;
  background: var(--cyan);
  border-radius: 2px;
  animation: waveAnim 1.2s ease-in-out infinite;
  box-shadow: 0 0 6px rgba(0,229,255,0.5);
}
.wave-bar:nth-child(1) { height: 60%; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 100%; animation-delay: .1s; }
.wave-bar:nth-child(3) { height: 40%; animation-delay: .2s; }
.wave-bar:nth-child(4) { height: 80%; animation-delay: .15s; }
.wave-bar:nth-child(5) { height: 55%; animation-delay: .05s; }
@keyframes waveAnim {
  0%,100% { transform: scaleY(1); }
  50%      { transform: scaleY(.25); }
}
.wave-bars.paused .wave-bar { animation-play-state: paused; }

/* Hidden YouTube player */
#yt-hidden { position: fixed; left: -9999px; top: 0; width: 1px; height: 1px; }

/* Question area */
.question-label {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  letter-spacing: .2em;
  color: var(--muted);
}

/* Choices grid */
.choices-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.choice-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  cursor: pointer;
  text-align: left;
  transition: all .2s cubic-bezier(.16,1,.3,1);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 12px;
}
.choice-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 0% 50%, rgba(0,229,255,0.1), transparent 60%);
  opacity: 0;
  transition: opacity .2s;
}
.choice-btn:hover:not(:disabled)::before { opacity: 1; }
.choice-btn:hover:not(:disabled) {
  border-color: rgba(0,229,255,0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.choice-btn:disabled { cursor: default; }
.choice-btn.correct {
  border-color: var(--green) !important;
  background: rgba(57,255,122,0.1);
  animation: correctFlash .5s ease;
}
.choice-btn.wrong {
  border-color: var(--red) !important;
  background: rgba(255,56,96,0.1);
  animation: wrongShake .4s ease;
}
.choice-btn.reveal {
  border-color: rgba(57,255,122,0.3);
  background: rgba(57,255,122,0.05);
}
@keyframes correctFlash {
  0%,100% { box-shadow: none; }
  50% { box-shadow: 0 0 30px rgba(57,255,122,0.6); }
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.choice-key {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  color: var(--cyan);
  width: 22px;
  flex-shrink: 0;
  letter-spacing: .1em;
}
.choice-text {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
}
.choice-artist {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.choice-icon {
  margin-left: auto;
  font-size: 1.2rem;
  opacity: 0;
  transition: opacity .2s;
}
.choice-btn.correct .choice-icon,
.choice-btn.wrong .choice-icon { opacity: 1; }

/* Keyboard input zone */
.input-zone {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
}
.input-zone-label {
  font-family: 'Bebas Neue', cursive;
  font-size: .85rem;
  letter-spacing: .15em;
  color: var(--muted);
  flex-shrink: 0;
}
.text-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.text-input:focus {
  border-color: rgba(0,229,255,0.4);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
}
.text-input::placeholder { color: var(--muted); }
.submit-btn {
  background: var(--cyan);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-family: 'Bebas Neue', cursive;
  font-size: 1rem;
  letter-spacing: .1em;
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
}
.submit-btn:hover { background: #33eeff; box-shadow: var(--glow-cyan); }
.submit-btn:disabled { opacity: .4; cursor: default; }

/* Feedback */
.feedback-bar {
  border-radius: 10px;
  padding: 14px 20px;
  font-weight: 700;
  font-size: 15px;
  display: none;
  align-items: center;
  gap: 10px;
  animation: slideIn .3s ease;
}
.feedback-bar.show { display: flex; }
.feedback-bar.correct { background: rgba(57,255,122,0.12); border: 1px solid rgba(57,255,122,0.3); color: var(--green); }
.feedback-bar.wrong   { background: rgba(255,56,96,0.1);  border: 1px solid rgba(255,56,96,0.3);  color: var(--red); }
.feedback-answer { color: var(--text); font-weight: 400; font-size: 13px; margin-top: 2px; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Next btn */
.next-btn {
  background: transparent;
  border: 1.5px solid var(--cyan);
  color: var(--cyan);
  border-radius: 10px;
  padding: 14px 32px;
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  letter-spacing: .2em;
  cursor: pointer;
  transition: all .2s;
  align-self: flex-end;
  display: none;
}
.next-btn.show { display: block; }
.next-btn:hover { background: var(--cyan); color: var(--bg); box-shadow: var(--glow-cyan); }

/* ─── RESULT SCREEN ─── */
#result-screen {
  position: relative;
  overflow: hidden;
}
.result-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,229,255,0.08), transparent 70%);
}
.result-inner {
  position: relative; z-index: 1;
  text-align: center;
  padding: 40px 24px;
  max-width: 500px;
  width: 100%;
}
.result-title {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(2.5rem, 8vw, 5rem);
  letter-spacing: .08em;
  background: linear-gradient(135deg, var(--cyan), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-score-wrap {
  margin: 28px 0;
  position: relative;
}
.result-score {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(5rem, 18vw, 10rem);
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 40px rgba(0,229,255,0.5));
}
.result-max {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.5rem;
  color: var(--muted);
  letter-spacing: .1em;
}
.result-rank {
  font-size: 2rem;
  margin-bottom: 8px;
}
.result-comment {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 32px;
  line-height: 1.7;
}
.result-breakdown {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 32px;
}
.breakdown-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  text-align: center;
}
.breakdown-val {
  font-family: 'Bebas Neue', cursive;
  font-size: 2rem;
  line-height: 1;
}
.breakdown-val.g { color: var(--green); }
.breakdown-val.r { color: var(--red); }
.breakdown-label {
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 4px;
}
.replay-btn {
  background: var(--cyan);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 14px 40px;
  font-family: 'Bebas Neue', cursive;
  font-size: 1.2rem;
  letter-spacing: .2em;
  cursor: pointer;
  transition: all .25s;
  margin-right: 12px;
}
.replay-btn:hover { background: #33eeff; box-shadow: var(--glow-cyan); transform: translateY(-2px); }
.menu-btn-sm {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--muted);
  border-radius: 10px;
  padding: 14px 28px;
  font-family: 'Bebas Neue', cursive;
  font-size: 1rem;
  letter-spacing: .15em;
  cursor: pointer;
  transition: all .2s;
}
.menu-btn-sm:hover { border-color: var(--text); color: var(--text); }

/* Confetti particles */
.confetti-wrap {
  position: fixed; inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.confetti-p {
  position: absolute;
  top: -10px;
  width: 8px; height: 8px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Autocomplete dropdown */
.autocomplete-wrap { position: relative; flex: 1; }
.dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: #1a2332;
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 8px;
  z-index: 100;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  display: none;
}
.dropdown.open { display: block; }
.dropdown-item {
  padding: 10px 14px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
  transition: background .15s;
  border-bottom: 1px solid var(--border);
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover, .dropdown-item.selected { background: rgba(0,229,255,0.1); color: var(--cyan); }
.dropdown-item em {
  color: var(--cyan);
  font-style: normal;
  font-weight: 700;
}

@media(max-width: 540px) {
  .choices-grid { grid-template-columns: 1fr; }
  .hud { padding: 12px 16px; }
  .game-main { padding: 20px 14px 32px; }
  .result-breakdown { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- Hidden YT player -->
<div id="yt-hidden"><div id="yt-player"></div></div>

<!-- MENU SCREEN -->
<div id="menu-screen" class="screen active">
  <div class="menu-bg"></div>
  <div class="menu-grid"></div>
  <div class="menu-inner">
    <div class="game-subtitle">Taiwan Music Challenge</div>
    <div class="game-title">猜歌<br>遊戲</div>
    <div class="divider-line"></div>
    <p class="menu-desc">每回合共 <strong>10 題</strong>，滿分 <strong>100 分</strong><br>播放音樂後，選擇選項或直接輸入歌名作答</p>
    <div class="playlist-cards">
      <div class="playlist-card a" onclick="startGame('A')">
        <div class="card-letter">A</div>
        <div class="card-genre">Band</div>
        <div class="card-name">樂團歌曲</div>
        <div class="card-count">63 首 · 台灣獨立樂團</div>
      </div>
      <div class="playlist-card b disabled">
        <span class="coming-soon-badge">即將推出</span>
        <div class="card-letter">B</div>
        <div class="card-genre">K-POP</div>
        <div class="card-name">韓流歌曲</div>
        <div class="card-count">敬請期待</div>
      </div>
      <div class="playlist-card c disabled">
        <span class="coming-soon-badge">即將推出</span>
        <div class="card-letter">C</div>
        <div class="card-genre">Pop</div>
        <div class="card-name">台灣流行樂</div>

  { id:'E0KMrPEzK-g', title:'美好的事可不可以發生在我身上', artist:'康士坦的變化球' },
  { id:'k16pGr1N_2I', title:'我還年輕 我還年輕', artist:'老王樂隊' },

  { id:'GOhm-G1U62I', title:'我喜歡你', artist:'芒果醬 Mango Jump' },
];

// ── State ──
const TOTAL_Q = 10;
const PTS_PER_Q = 10;
let playlist = [];
let questions = [];
let currentQ = 0;
let score = 0;
let correctCount = 0;
let answered = false;
let ytPlayer = null;
let ytReady = false;
let selectedDropdownIdx = -1;
let currentSong = null;

// ── YouTube API ──
window.onYouTubeIframeAPIReady = function () {
  ytReady = true;
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, rel: 0 },
    events: {
      onReady: () => { if (currentSong) loadAndPlay(currentSong.id); },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.PLAYING) {
          document.getElementById('wave-bars').classList.remove('paused');
          document.getElementById('player-status').textContent = '正在播放中...';
        }
        if (e.data === YT.PlayerState.BUFFERING) {
          document.getElementById('player-status').textContent = '緩衝中...';
        }
      }
    }
  });
};
(function(){
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

function loadAndPlay(videoId) {
  if (!ytPlayer || !ytReady) return;
  if (ytPlayer.loadVideoById) {
    // Start from random point (10s ~ 60s) for fun
    const startSec = Math.floor(Math.random() * 50) + 10;
    ytPlayer.loadVideoById({ videoId, startSeconds: startSec });
  }
}

function stopPlayer() {
  if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
  document.getElementById('wave-bars').classList.add('paused');
}

// ── Game logic ──
function startGame(type) {
  playlist = [...PLAYLIST_A];
  score = 0;
  correctCount = 0;
  currentQ = 0;
  // Pick 10 random, no repeat
  const shuffled = shuffle([...playlist]);
  questions = shuffled.slice(0, TOTAL_Q);

  showScreen('game-screen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const song = questions[currentQ];
  currentSong = song;

  // HUD
  document.getElementById('q-counter').textContent = `Q ${currentQ + 1} / ${TOTAL_Q}`;
  document.getElementById('score-val').textContent = score;
  document.getElementById('progress-fill').style.width = `${(currentQ / TOTAL_Q) * 100}%`;

  // Player
  document.getElementById('player-status').textContent = '載入中...';
  document.getElementById('player-hint').textContent = '仔細聆聽，猜猜這是哪首歌？';
  document.getElementById('wave-bars').classList.remove('paused');
  if (ytReady) loadAndPlay(song.id);

  // Build 4 choices: 1 correct + 3 random wrong
  const pool = playlist.filter(s => s.id !== song.id);
  const wrong3 = shuffle(pool).slice(0, 3);
  const choices = shuffle([song, ...wrong3]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  const keys = ['A', 'B', 'C', 'D'];
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.id = 'choice-' + i;
    btn.onclick = () => selectChoice(i, c, song);
    btn.innerHTML = `
      <span class="choice-key">${keys[i]}</span>
      <div>
        <div class="choice-text">${c.title}</div>
        <div class="choice-artist">${c.artist}</div>
      </div>
      <span class="choice-icon" id="ci-${i}"></span>
    `;
    grid.appendChild(btn);
  });
  // Store mapping
  grid.dataset.correct = song.id;
  grid.dataset.choices = JSON.stringify(choices.map(c => c.id));

  // Reset feedback, input, next
  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar';
  document.getElementById('next-btn').className = 'next-btn';
  const ti = document.getElementById('text-input');
  ti.value = '';
  ti.disabled = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('autocomplete-dropdown').innerHTML = '';
  document.getElementById('autocomplete-dropdown').classList.remove('open');
  selectedDropdownIdx = -1;
  ti.focus();
}

function selectChoice(idx, chosen, correct) {
  if (answered) return;
  answered = true;
  stopPlayer();

  const isCorrect = chosen.id === correct.id;
  if (isCorrect) {
    score += PTS_PER_Q;
    correctCount++;
  }

  // Highlight buttons
  const grid = document.getElementById('choices-grid');
  const choiceIds = JSON.parse(grid.dataset.choices);
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('choice-' + i);
    btn.disabled = true;
    if (choiceIds[i] === correct.id) {
      btn.classList.add('correct');
      document.getElementById('ci-' + i).textContent = '✓';
    } else if (i === idx && !isCorrect) {
      btn.classList.add('wrong');
      document.getElementById('ci-' + i).textContent = '✗';
    } else {
      btn.classList.add('reveal');
    }
  }

  showFeedback(isCorrect, correct);
  document.getElementById('score-val').textContent = score;
  document.getElementById('text-input').disabled = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('next-btn').className = 'next-btn show';
}

function submitText() {
  if (answered) return;
  const val = document.getElementById('text-input').value.trim();
  if (!val) return;

  const song = questions[currentQ];
  const norm = s => s.replace(/\s+/g, '').toLowerCase();
  const isCorrect = norm(val) === norm(song.title);

  // Find which button matches correct answer & select it visually
  const grid = document.getElementById('choices-grid');
  const choiceIds = JSON.parse(grid.dataset.choices);
  const correctBtnIdx = choiceIds.indexOf(song.id);

  // Highlight as if that button was clicked
  selectChoice(correctBtnIdx, { id: isCorrect ? song.id : '__wrong__' }, song);
}

function showFeedback(isCorrect, song) {
  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar show ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('feedback-icon').textContent = isCorrect ? '✓' : '✗';
  document.getElementById('feedback-msg').textContent = isCorrect ? '答對了！+10 分' : '答錯了！';
  document.getElementById('feedback-answer').textContent = isCorrect ? '' : `正確答案：${song.title}（${song.artist}）`;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL_Q) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  stopPlayer();
  showScreen('result-screen');
  document.getElementById('progress-fill').style.width = '100%';

  document.getElementById('final-score').textContent = score;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = TOTAL_Q - correctCount;

  const pct = score / 100;
  let rank, comment;
  if (pct === 1)      { rank = '🏆'; comment = '滿分！你簡直是台灣獨立樂團的百科全書！'; }
  else if (pct >= .8) { rank = '🥇'; comment = '非常厲害！你對這些樂團真的很熟悉！'; }
  else if (pct >= .6) { rank = '🥈'; comment = '不錯！還有一些歌等你去探索。'; }
  else if (pct >= .4) { rank = '🥉'; comment = '繼續加油！多聽幾遍一定能進步！'; }
  else                { rank = '🎵'; comment = '沒關係，趕快把這些樂團加入收藏清單吧！'; }

  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-comment').textContent = comment;

  if (pct >= .6) spawnConfetti();

  document.getElementById('replay-btn').onclick = () => startGame('A');
}

// ── Autocomplete ──
document.getElementById('text-input').addEventListener('input', function () {
  const val = this.value.trim();
  const dd = document.getElementById('autocomplete-dropdown');
  selectedDropdownIdx = -1;
  if (!val) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

  const norm = s => s.toLowerCase();
  const matches = playlist.filter(s =>
    norm(s.title).includes(norm(val)) || norm(s.artist).includes(norm(val))
  ).slice(0, 8);

  if (!matches.length) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

  dd.innerHTML = matches.map((s, i) => {
    const hi = s.title.replace(new RegExp(`(${val})`, 'gi'), '<em>$1</em>');
    return `<div class="dropdown-item" data-idx="${i}" data-title="${s.title}" onclick="pickDropdown(this)">${hi} <span style="color:var(--muted);font-size:11px">— ${s.artist}</span></div>`;
  }).join('');
  dd.classList.add('open');
});

document.getElementById('text-input').addEventListener('keydown', function (e) {
  const dd = document.getElementById('autocomplete-dropdown');
  const items = dd.querySelectorAll('.dropdown-item');
  if (dd.classList.contains('open') && items.length) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedDropdownIdx = Math.min(selectedDropdownIdx + 1, items.length - 1);
      items.forEach((it, i) => it.classList.toggle('selected', i === selectedDropdownIdx));
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedDropdownIdx = Math.max(selectedDropdownIdx - 1, 0);
      items.forEach((it, i) => it.classList.toggle('selected', i === selectedDropdownIdx));
      return;
    }
    if (e.key === 'Enter' && selectedDropdownIdx >= 0) {
      e.preventDefault();
      pickDropdown(items[selectedDropdownIdx]);
      return;
    }
    if (e.key === 'Escape') { dd.classList.remove('open'); return; }
  }
  if (e.key === 'Enter') submitText();
});

function pickDropdown(el) {
  document.getElementById('text-input').value = el.dataset.title;
  document.getElementById('autocomplete-dropdown').classList.remove('open');
  document.getElementById('text-input').focus();
}

// Close dropdown on outside click
document.addEventListener('click', function (e) {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.getElementById('autocomplete-dropdown').classList.remove('open');
  }
});

// Keyboard A/B/C/D shortcuts
document.addEventListener('keydown', function (e) {
  if (answered) return;
  const map = { 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
  const k = e.key.toLowerCase();
  if (k in map && document.getElementById('game-screen').classList.contains('active')) {
    const ti = document.getElementById('text-input');
    if (document.activeElement === ti) return;
    const btn = document.getElementById('choice-' + map[k]);
    if (btn) btn.click();
  }
  if (e.key === 'Enter' && document.getElementById('next-btn').classList.contains('show')) {
    if (document.activeElement !== document.getElementById('text-input')) {
      nextQuestion();
    }
  }
});

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu() {
  stopPlayer();
  showScreen('menu-screen');
}

// ── Utilities ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function spawnConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#00e5ff','#ff6b35','#ffd600','#39ff7a','#ff3860','#fff'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-p';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    p.style.animationDelay = (Math.random() * 1.5) + 's';
    p.style.opacity = Math.random() * 0.8 + 0.2;
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}
</script>
